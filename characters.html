<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Characters — Leonida</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #00ffff;
  --pink: #ff00c8;
  --purple: #7700ff;
  --bg: #04001a;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Rajdhani', sans-serif;
  overflow-x: hidden;
  position: relative;
}

.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 55% at 12% 20%, rgba(0,255,255,0.07) 0%, transparent 100%),
    radial-gradient(ellipse 65% 50% at 88% 78%, rgba(255,0,200,0.08) 0%, transparent 100%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(100,0,220,0.05) 0%, transparent 100%);
}
.bg-grid {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background-image:
    linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 85% 65% at center, black 10%, transparent 75%);
}

/* HAMBURGER */
.hamburger-btn {
  position: fixed; top: 22px; right: 26px; z-index: 200;
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(0,255,255,0.05);
  border: 1.5px solid rgba(0,255,255,0.25);
  box-shadow: 0 0 20px rgba(0,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.1);
  backdrop-filter: blur(16px); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  transition: all 0.3s ease;
  animation: fadeSlideIn 0.8s cubic-bezier(0.34,1.4,0.64,1) both;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateX(20px) scale(0.8); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
.hamburger-btn:hover {
  background: rgba(0,255,255,0.1); border-color: var(--cyan);
  box-shadow: 0 0 28px rgba(0,255,255,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
  transform: scale(1.08);
}
.hamburger-btn.open {
  background: rgba(255,0,200,0.08); border-color: rgba(255,0,200,0.3);
  box-shadow: 0 0 28px rgba(255,0,200,0.2);
}
.bar {
  width: 20px; height: 2px; border-radius: 2px; background: var(--cyan);
  transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1), opacity 0.2s;
  transform-origin: center;
}
.hamburger-btn.open .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); background: var(--pink); }
.hamburger-btn.open .bar:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger-btn.open .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background: var(--pink); }

/* NAV OVERLAY */
.nav-overlay {
  position: fixed; inset: 0; z-index: 150;
  pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
}
.nav-overlay.open { pointer-events: all; opacity: 1; }
.nav-backdrop {
  position: absolute; inset: 0;
  background: rgba(4,0,26,0.9); backdrop-filter: blur(24px);
}
.nav-panel {
  position: absolute; top: 0; right: 0;
  width: min(380px,100vw); height: 100%;
  background: linear-gradient(160deg, rgba(0,255,255,0.04), rgba(255,0,200,0.04));
  border-left: 1px solid rgba(0,255,255,0.12);
  box-shadow: -30px 0 80px rgba(0,0,0,0.5);
  transform: translateX(100%);
  transition: transform 0.5s cubic-bezier(0.34,1.2,0.64,1);
  display: flex; flex-direction: column; justify-content: center;
  padding: 80px 48px; overflow: hidden;
}
.nav-panel::before {
  content: ''; position: absolute; top: -80px; right: -80px;
  width: 360px; height: 360px;
  background: radial-gradient(circle, rgba(0,255,255,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.nav-panel::after {
  content: ''; position: absolute; bottom: -60px; left: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(255,0,200,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.nav-overlay.open .nav-panel { transform: translateX(0); }
.nav-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.4em;
  text-transform: uppercase; color: rgba(0,255,255,0.35); margin-bottom: 36px;
}
.nav-links { list-style: none; display: flex; flex-direction: column; gap: 2px; }
.nav-links li {
  opacity: 0; transform: translateX(28px);
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
}
.nav-overlay.open .nav-links li:nth-child(1){opacity:1;transform:none;transition-delay:.07s}
.nav-overlay.open .nav-links li:nth-child(2){opacity:1;transform:none;transition-delay:.12s}
.nav-overlay.open .nav-links li:nth-child(3){opacity:1;transform:none;transition-delay:.17s}
.nav-overlay.open .nav-links li:nth-child(4){opacity:1;transform:none;transition-delay:.22s}
.nav-overlay.open .nav-links li:nth-child(5){opacity:1;transform:none;transition-delay:.27s}
.nav-overlay.open .nav-links li:nth-child(6){opacity:1;transform:none;transition-delay:.32s}
.nav-links li a {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(36px,6vw,52px); font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.04em;
  text-decoration: none; color: rgba(255,255,255,0.18);
  display: block; padding: 9px 0; line-height: 1;
  transition: color 0.2s, letter-spacing 0.25s; position: relative;
}
.nav-links li a::after {
  content: ''; position: absolute; left: 0; bottom: 7px;
  width: 0; height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--pink));
  transition: width 0.3s cubic-bezier(0.34,1.4,0.64,1); border-radius: 2px;
}
.nav-links li a:hover { color: #fff; letter-spacing: 0.08em; }
.nav-links li a:hover::after { width: 100%; }
.nav-links li:nth-child(odd) a:hover  { color: var(--cyan); text-shadow: 0 0 20px rgba(0,255,255,0.35); }
.nav-links li:nth-child(even) a:hover { color: var(--pink); text-shadow: 0 0 20px rgba(255,0,200,0.35); }
.nav-links li a.active { color: var(--pink); }
.nav-links li a.active::after { width: 38%; background: var(--pink); }
.nav-footer {
  position: absolute; bottom: 36px; left: 48px; right: 48px;
  padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: space-between;
  opacity: 0; transition: opacity 0.4s ease 0.38s;
}
.nav-overlay.open .nav-footer { opacity: 1; }
.nav-footer-text { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.18); }
.nav-footer-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--pink); box-shadow: 0 0 8px var(--pink);
  animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(0.55)} }

/* MAIN */
main {
  position: relative; z-index: 5;
  padding: 90px 40px 80px;
  max-width: 1400px; margin: 0 auto;
}

.page-header {
  display: flex; align-items: flex-end;
  justify-content: space-between; margin-bottom: 28px;
  animation: popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
}
.eyebrow {
  font-size: 11px; font-weight: 600; letter-spacing: 0.4em;
  text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 4px;
}
.page-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(36px,6vw,72px); font-weight: 900;
  text-transform: uppercase; line-height: 0.9;
  background: linear-gradient(90deg, #00ffff, #bf00ff, #ff00c8, #00e5ff, #00ffff);
  background-size: 300% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: textShimmer 4s linear infinite;
  filter: drop-shadow(0 0 20px rgba(0,255,255,0.2));
}
@keyframes textShimmer { 0%{background-position:0%} 100%{background-position:300%} }

.count-badge {
  font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.22); padding: 8px 16px;
  border-radius: 999px; border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}
.count-badge span { color: var(--cyan); text-shadow: 0 0 12px rgba(0,255,255,0.5); }

.status-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px; border-radius: 10px;
  border: 1px solid rgba(0,255,255,0.1);
  background: rgba(0,255,255,0.02);
  margin-bottom: 28px;
  animation: popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.15); flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.status-dot.loading { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; animation: blink 0.8s ease-in-out infinite; }
.status-dot.ok      { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: blink 2s ease-in-out infinite; }
.status-dot.err     { background: #ff3040; box-shadow: 0 0 8px #ff3040; }
.status-text {
  font-size: 11px; font-weight: 600; font-family: monospace;
  color: rgba(255,255,255,0.22); flex: 1; transition: color 0.3s;
}
.status-text.ok  { color: rgba(0,255,255,0.55); }
.status-text.err { color: rgba(255,80,80,0.6); }

.empty {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; padding: 80px 20px; text-align: center;
}
.empty-icon { font-size: 40px; opacity: 0.3; }
.empty-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 26px; font-weight: 900; text-transform: uppercase;
  color: rgba(255,255,255,0.18); letter-spacing: 0.05em;
}
.empty-sub {
  font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,0.1); max-width: 340px; line-height: 1.9;
}
.empty-sub code {
  color: rgba(0,255,255,0.4); background: rgba(0,255,255,0.06);
  padding: 2px 7px; border-radius: 4px;
  letter-spacing: 0; text-transform: none; font-size: 11px;
}

/* GRID */
.places-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

/* CARD */
.place-card {
  border-radius: 14px; overflow: hidden;
  border: 1px solid rgba(0,255,255,0.12);
  background: rgba(0,255,255,0.03);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  cursor: pointer;
  opacity: 0; transform: scale(0.92) translateY(14px);
  transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.2s, border-color 0.2s;
}
.place-card.visible { opacity: 1; transform: scale(1) translateY(0); }
.place-card:hover {
  transform: translateY(-4px) scale(1.01) !important;
  border-color: rgba(0,255,255,0.3);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,255,0.07);
}
.place-card:nth-child(even) { border-color: rgba(255,0,200,0.12); background: rgba(255,0,200,0.03); }
.place-card:nth-child(even):hover {
  border-color: rgba(255,0,200,0.3);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(255,0,200,0.07);
}

.card-img-wrap {
  position: relative; width: 100%;
  aspect-ratio: 16/9; overflow: hidden;
  background: rgba(255,255,255,0.04);
}
.card-img-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.4s ease;
}
.place-card:hover .card-img-wrap img { transform: scale(1.06); }
.card-img-wrap::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(0deg, rgba(4,0,26,0.65) 0%, transparent 50%);
  pointer-events: none;
}
.card-num {
  position: absolute; top: 10px; left: 12px; z-index: 2;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(255,255,255,0.5); background: rgba(4,0,26,0.6);
  padding: 4px 10px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px);
}
.card-body { padding: 12px 14px 14px; }
.card-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.85); line-height: 1; margin-bottom: 5px;
}
.card-file {
  font-size: 10px; font-weight: 600; letter-spacing: 0.15em;
  color: rgba(255,255,255,0.18); font-family: monospace;
}

/* LIGHTBOX */
#ssViewer {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(4,0,26,0.96);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(24px);
  opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
}
#ssViewer.active { opacity: 1; pointer-events: all; }

.viewer-inner {
  display: flex; align-items: flex-start; gap: 40px;
  max-width: 1140px; width: 100%; max-height: 88vh;
}

.viewer-img-col {
  flex: 0 0 auto; display: flex; flex-direction: column; align-items: center;
}

#ssImg {
  max-width: 500px; max-height: 500px;
  width: auto; height: auto;
  border-radius: 12px;
  border: 1px solid rgba(0,255,255,0.2);
  box-shadow: 0 0 60px rgba(0,255,255,0.1);
  object-fit: contain; transition: opacity 0.15s; display: block;
}
.lb-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.3); margin-top: 12px; text-align: center;
}
.viewer-controls {
  display: flex; align-items: center; gap: 20px; margin-top: 16px;
}
.viewer-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px; font-weight: 900;
  color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 999px; padding: 8px 22px;
  cursor: pointer; letter-spacing: 0.08em;
  transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.15s;
}
.viewer-btn:hover {
  color: #fff; border-color: rgba(0,255,255,0.4);
  background: rgba(0,255,255,0.08); transform: scale(1.08);
}
.viewer-counter {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 900;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.25); min-width: 80px; text-align: center;
}
.viewer-counter span { color: var(--cyan); }

/* BIO PANEL */
.viewer-bio-col {
  flex: 1 1 0; min-width: 0;
  max-height: 560px; overflow-y: auto;
  padding-right: 6px;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,255,255,0.2) transparent;
}
.viewer-bio-col::-webkit-scrollbar { width: 4px; }
.viewer-bio-col::-webkit-scrollbar-track { background: transparent; }
.viewer-bio-col::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.2); border-radius: 4px; }

.bio-wrap {
  background: rgba(0,255,255,0.03);
  border: 1px solid rgba(0,255,255,0.12);
  border-radius: 16px; padding: 26px 24px 28px;
  transition: opacity 0.2s;
}
.bio-eyebrow {
  font-size: 10px; font-weight: 600; letter-spacing: 0.35em; text-transform: uppercase;
  color: rgba(0,255,255,0.4); margin-bottom: 6px;
}
.bio-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 34px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: #fff; line-height: 1; margin-bottom: 14px;
}
.bio-tag {
  display: inline-block;
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(255,200,0,0.75);
  background: rgba(255,200,0,0.06);
  border: 1px solid rgba(255,200,0,0.18);
  border-radius: 999px; padding: 5px 14px; margin-bottom: 18px;
}
.bio-divider {
  width: 100%; height: 1px;
  background: linear-gradient(90deg, rgba(0,255,255,0.18), transparent);
  margin-bottom: 18px;
}
.bio-quote {
  font-size: 13px; font-weight: 600; font-style: italic;
  color: rgba(0,255,255,0.55);
  border-left: 2px solid rgba(0,255,255,0.25);
  padding-left: 14px; margin-bottom: 18px; line-height: 1.65;
}
.bio-text {
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.45); line-height: 1.8;
}
.bio-text p { margin-bottom: 12px; }
.bio-text p:last-child { margin-bottom: 0; }
.bio-no-info {
  font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 30px 0; text-align: center;
}

#ssClose {
  position: fixed; top: 20px; right: 24px;
  font-size: 24px; color: rgba(255,255,255,0.4);
  cursor: pointer; background: none; border: none;
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  transition: color 0.15s; z-index: 1001;
}
#ssClose:hover { color: #fff; }

@keyframes popIn  { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: none; } }
@keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0.2} }

@media (max-width: 800px) {
  .viewer-inner { flex-direction: column; align-items: center; gap: 20px; max-height: none; overflow-y: auto; }
  #ssImg { max-width: 90vw; max-height: 50vw; }
  .viewer-bio-col { max-height: none; width: 100%; }
}
@media (max-width: 600px) {
  main { padding: 80px 20px 60px; }
  .nav-panel { padding: 70px 28px; }
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<!-- Lightbox -->
<div id="ssViewer">
  <button id="ssClose">✕</button>
  <div class="viewer-inner">
    <div class="viewer-img-col">
      <img id="ssImg" src="" alt="">
      <div class="lb-label" id="lbLabel"></div>
      <div class="viewer-controls">
        <button class="viewer-btn" id="ssPrev">&#8592;</button>
        <div class="viewer-counter"><span id="viewerCurrent">1</span> / <span id="viewerTotal">0</span></div>
        <button class="viewer-btn" id="ssNext">&#8594;</button>
      </div>
    </div>
    <div class="viewer-bio-col">
      <div class="bio-wrap" id="bioWrap">
        <div class="bio-no-info">No bio available</div>
      </div>
    </div>
  </div>
</div>

<!-- Hamburger -->
<button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</button>

<!-- Nav overlay -->
<div class="nav-overlay" id="navOverlay">
  <div class="nav-backdrop" id="navBackdrop"></div>
  <div class="nav-panel">
    <div class="nav-label">Navigation</div>
    <ul class="nav-links">
      <li><a href="index">Home</a></li>
      <li><a href="map">Map</a></li>
      <li><a href="places">Places</a></li>
      <li><a href="#" class="active">Characters</a></li>
      <li><a href="screenshots">Screenshots</a></li>
      <li><a href="trailers">Trailers</a></li>
    </ul>
    <div class="nav-footer">
      <span class="nav-footer-text">November 19, 2026</span>
      <div class="nav-footer-dot"></div>
    </div>
  </div>
</div>

<main>
  <div class="page-header">
    <div>
      <div class="eyebrow">Leonida ·</div>
      <div class="page-title">Characters</div>
    </div>
    <div class="count-badge"><span id="count">0</span> characters</div>
  </div>

  <div class="status-bar">
    <div class="status-dot loading" id="status-dot"></div>
    <div class="status-text" id="status-text">Scanning repository…</div>
  </div>

  <div class="empty" id="empty">
    <div class="empty-icon">📂</div>
    <div class="empty-title">No Images Found</div>
    <div class="empty-sub">
      Drop <code>.jpg</code>, <code>.png</code>, <code>.webp</code> or <code>.gif</code> files
      into <code>leonida/npc/</code> and they'll appear here automatically.
    </div>
  </div>

  <div class="places-grid" id="gallery"></div>
</main>

<script>
const GITHUB_USER = 'vocql';
const GITHUB_REPO = 'leonidagta';
const BRANCH      = 'main';
const IMAGES_PATH = 'leonida/people';
const IMAGE_EXTS  = ['.jpg','.jpeg','.png','.webp','.gif'];

const CHARACTER_BIOS = {
  'lucia': { fullName:'Lucia Caminos', role:'Protagonist', quote:"The only thing that matters is who you know and what you got.", bio:["Lucia's father taught her to fight as soon as she could walk. Life has been coming at her swinging ever since. Fighting for her family landed her in the Leonida Penitentiary. Sheer luck got her out. Lucia's learned her lesson — only smart moves from here.","More than anything, Lucia wants the good life her mom has dreamed of since their days in Liberty City — but instead of half-baked fantasies, Lucia is prepared to take matters into her own hands. A life with Jason could be her way out. Fresh out of prison and ready to change the odds in her favor, Lucia's committed to her plan — no matter what it takes."] },

  'drequan': { fullName:"Dre'Quan Priest", role:'Aspiring Music Mogul · Only Raw Records', quote:"You're with the label now.", bio:["Dre'Quan was always more of a hustler than a gangster. Even when he was dealing on the streets to make ends meet, breaking into music was the goal.","Now that he's signed the Real Dimez, Dre'Quan's days of booking acts into Boobie's strip club might be numbered as he sets his sights on the Vice City scene."] },
  'dre quan': { fullName:"Dre'Quan Priest", role:'Aspiring Music Mogul · Only Raw Records', quote:"You're with the label now.", bio:["Dre'Quan was always more of a hustler than a gangster. Even when he was dealing on the streets to make ends meet, breaking into music was the goal.","Now that he's signed the Real Dimez, Dre'Quan's days of booking acts into Boobie's strip club might be numbered as he sets his sights on the Vice City scene."] },
  'real dimez': { fullName:'Real Dimez (Bae-Luxe & Roxy)', role:'Rap Duo · Only Raw Records', quote:'All my dimes in this club. Meet my twin, make it a dub.', bio:["Bae-Luxe and Roxy aka Real Dimez have been friends since high school — girls with the savvy to turn their time shaking down local dealers into cold, hard cash via spicy rap tracks and a relentless social media presence.","An early hit single with local rapper DWNPLY took Real Dimez to new heights. Now, after five years and a whole lot of trouble, they're signed to Only Raw Records, hoping lightning can strike twice."] },
  'realdimez': { fullName:'Real Dimez (Bae-Luxe & Roxy)', role:'Rap Duo · Only Raw Records', quote:'All my dimes in this club. Meet my twin, make it a dub.', bio:["Bae-Luxe and Roxy aka Real Dimez have been friends since high school — girls with the savvy to turn their time shaking down local dealers into cold, hard cash via spicy rap tracks and a relentless social media presence.","An early hit single with local rapper DWNPLY took Real Dimez to new heights. Now, after five years and a whole lot of trouble, they're signed to Only Raw Records, hoping lightning can strike twice."] },
  'bae luxe': { fullName:'Bae-Luxe', role:'Real Dimez · Rapper', quote:'All my dimes in this club. Meet my twin, make it a dub.', bio:["One half of the rap duo Real Dimez alongside her high-school friend Roxy. Together they turned their time shaking down local dealers into viral rap tracks and a relentless social media presence.","After an early hit single with DWNPLY launched them to new heights, they found themselves signed to Only Raw Records — hoping lightning can strike twice."] },
  'roxy': { fullName:'Roxy', role:'Real Dimez · Rapper', quote:'All my dimes in this club. Meet my twin, make it a dub.', bio:["One half of the rap duo Real Dimez alongside Bae-Luxe, her friend since high school. The duo rose from shaking down local dealers to going viral with spicy rap tracks.","After five years and a whole lot of trouble, they're now signed to Only Raw Records, hoping their next single can recapture their early fame."] },
  'raul': { fullName:'Raul Bautista', role:'Seasoned Bank Robber', quote:"Life is full of surprises, my friend. I think we'd all be wise to remember that.", bio:["Confidence, charm, and cunning — Raul's a seasoned bank robber always on the hunt for talent ready to take the risks that bring the biggest rewards.","Raul's recklessness raises the stakes with every score. Sooner or later, his crew will have to double down or pull their chips from the table."] },
  'brian': { fullName:'Brian Heder', role:"Drug Runner · Jason's Landlord", quote:"I hauled so much grass in that plane, I could make the state of Leonida levitate.", bio:["Brian's a classic drug runner from the golden age of smuggling in the Keys. Still moving product through his boat yard with his third wife, Lori, Brian's been around long enough to let others do his dirty work. Looks like a Leonida beach bum — moves like a great white shark.","Brian's letting Jason live rent-free at one of his properties — so long as he helps with local shakedowns, and stops by for Lori's sangria once in a while."] },
  'stefanie': { fullName:'Stefanie G.', role:'Leonida Dept. of Corrections · Social Worker', quote:"Do you know why you're here?", bio:["Stefanie G. works for the Leonida Department of Corrections as a social worker. She was assigned as Lucia's correctional counselor during Lucia's incarceration at Leonida Penitentiary in Vice-Dale County.","Stefanie is the very first voice heard in Grand Theft Auto VI, opening the game's debut trailer with a single question to Lucia. Her last name remains unknown — only the initial G. is visible on her office nameplate."] }
};

function getBio(filename) {
  const stem = filename.replace(/\.[^.]+$/, '').toLowerCase().replace(/[-_]/g, ' ').trim();
  if (CHARACTER_BIOS[stem]) return CHARACTER_BIOS[stem];
  for (const key of Object.keys(CHARACTER_BIOS)) {
    if (stem.includes(key) || key.includes(stem)) return CHARACTER_BIOS[key];
  }
  return null;
}

function renderBio(filename, label) {
  const data = getBio(filename);
  if (!data) {
    bioWrap.innerHTML = `<div class="bio-eyebrow">Character File</div><div class="bio-name">${label}</div><div class="bio-no-info">No official bio available yet.</div>`;
    return;
  }
  bioWrap.innerHTML = `
    <div class="bio-eyebrow">Character File</div>
    <div class="bio-name">${data.fullName}</div>
    <div class="bio-tag">${data.role}</div>
    <div class="bio-divider"></div>
    ${data.quote ? `<div class="bio-quote">"${data.quote}"</div>` : ''}
    <div class="bio-text">${data.bio.map(p=>`<p>${p}</p>`).join('')}</div>
  `;
}

const gallery       = document.getElementById('gallery');
const ssViewer      = document.getElementById('ssViewer');
const ssImg         = document.getElementById('ssImg');
const countEl       = document.getElementById('count');
const statusDot     = document.getElementById('status-dot');
const statusText    = document.getElementById('status-text');
const lbLabel       = document.getElementById('lbLabel');
const viewerCurrent = document.getElementById('viewerCurrent');
const viewerTotal   = document.getElementById('viewerTotal');
const bioWrap       = document.getElementById('bioWrap');
let ssIdx = 0, allImages = [];

function setStatus(type, msg) {
  statusDot.className = 'status-dot ' + type;
  statusText.className = 'status-text ' + (type === 'loading' ? '' : type);
  statusText.textContent = msg;
}

async function loadImages() {
  setStatus('loading', `Fetching ${GITHUB_USER}/${GITHUB_REPO}/${IMAGES_PATH} …`);
  const apiURL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${IMAGES_PATH}?ref=${BRANCH}`;
  let files;
  try {
    const res = await fetch(apiURL, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
    if (res.status === 404) { setStatus('err', 'Folder not found: ' + IMAGES_PATH); document.getElementById('empty').style.display = 'flex'; return; }
    if (!res.ok) throw new Error('GitHub API returned ' + res.status);
    files = await res.json();
  } catch (err) { setStatus('err', 'GitHub API error — ' + err.message); document.getElementById('empty').style.display = 'flex'; return; }
  if (!Array.isArray(files)) { setStatus('err', 'Unexpected response'); document.getElementById('empty').style.display = 'flex'; return; }

  const images = files.filter(f => f.type === 'file' && IMAGE_EXTS.some(ext => f.name.toLowerCase().endsWith(ext)));
  if (!images.length) { setStatus('ok', IMAGES_PATH + '  ·  no images found yet'); document.getElementById('empty').style.display = 'flex'; return; }

  setStatus('ok', `${IMAGES_PATH}  ·  ${images.length} character${images.length !== 1 ? 's' : ''} detected`);
  countEl.textContent = images.length;
  viewerTotal.textContent = images.length;
  allImages = images;

  images.forEach((file, i) => {
    const src   = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${IMAGES_PATH}/${file.name}`;
    const label = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    const card  = document.createElement('div');
    card.className = 'place-card';
    card.style.transitionDelay = (i * 0.04).toFixed(2) + 's';
    const imgWrap = document.createElement('div'); imgWrap.className = 'card-img-wrap';
    const numBadge = document.createElement('span'); numBadge.className = 'card-num'; numBadge.textContent = '#' + String(i+1).padStart(2,'0');
    const img = document.createElement('img'); img.alt = label; img.loading = 'lazy'; img.dataset.idx = String(i); img.src = src;
    imgWrap.appendChild(numBadge); imgWrap.appendChild(img);
    const cardBody = document.createElement('div'); cardBody.className = 'card-body';
    cardBody.innerHTML = `<div class="card-name">${label}</div><div class="card-file">${file.name}</div>`;
    card.appendChild(imgWrap); card.appendChild(cardBody);
    gallery.appendChild(card); ssObs.observe(card);
  });
}

const ssObs = new IntersectionObserver(entries => {
  entries.forEach(en => { if (en.isIntersecting) { en.target.classList.add('visible'); ssObs.unobserve(en.target); } });
}, { threshold: 0.05 });

function getVisibleImgs() { return [...gallery.querySelectorAll('img[data-idx]')]; }
function labelFromFile(file) { return file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }
function openViewer(idx) {
  const imgs = getVisibleImgs(); if (!imgs.length) return;
  ssIdx = idx;
  const file = allImages[ssIdx]; const label = labelFromFile(file);
  ssImg.src = imgs[ssIdx].src; lbLabel.textContent = label;
  viewerCurrent.textContent = ssIdx + 1; viewerTotal.textContent = imgs.length;
  renderBio(file.name, label); ssViewer.classList.add('active');
}
function ssClose() { ssViewer.classList.remove('active'); }
function ssStep(dir) {
  const imgs = getVisibleImgs(); if (!imgs.length) return;
  ssIdx = (ssIdx + dir + imgs.length) % imgs.length;
  ssImg.style.opacity = '0'; bioWrap.style.opacity = '0';
  setTimeout(() => {
    const file = allImages[ssIdx]; const label = labelFromFile(file);
    ssImg.src = imgs[ssIdx].src; lbLabel.textContent = label;
    viewerCurrent.textContent = ssIdx + 1; renderBio(file.name, label);
    ssImg.style.opacity = '1'; bioWrap.style.opacity = '1';
  }, 130);
}

gallery.addEventListener('click', e => { const img = e.target.closest('img[data-idx]'); if (img) openViewer(parseInt(img.dataset.idx, 10)); });
document.getElementById('ssClose').addEventListener('click', ssClose);
ssViewer.addEventListener('click', e => { if (e.target === ssViewer) ssClose(); });
document.getElementById('ssPrev').addEventListener('click', () => ssStep(-1));
document.getElementById('ssNext').addEventListener('click', () => ssStep(1));
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { if (ssViewer.classList.contains('active')) ssClose(); else if (overlay.classList.contains('open')) toggleMenu(); }
  if (!ssViewer.classList.contains('active')) return;
  if (e.key === 'ArrowLeft') ssStep(-1);
  if (e.key === 'ArrowRight') ssStep(1);
});

/* HAMBURGER */
const hBtn = document.getElementById('hamburgerBtn');
const overlay = document.getElementById('navOverlay');
const backdrop = document.getElementById('navBackdrop');
function toggleMenu() {
  const open = overlay.classList.toggle('open');
  hBtn.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
}
hBtn.addEventListener('click', toggleMenu);
backdrop.addEventListener('click', toggleMenu);

loadImages();
</script>
</body>
</html>
