<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map — Leonida</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #04001a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(0,255,255,0.13) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 75%, rgba(255,0,200,0.15) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, rgba(90,0,200,0.07) 0%, transparent 55%);
  }

  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }

  /* NAVBAR */
  nav {
    position: relative; z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px 36px;
    flex-shrink: 0;
    animation: slideDown 0.8s cubic-bezier(0.34, 1.4, 0.64, 1) both;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 8px;
    list-style: none;
  }

  .nav-links li a {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 10px 22px;
    border-radius: 999px;
    border: 1.5px solid rgba(0,255,255,0.18);
    background: rgba(0,255,255,0.04);
    color: rgba(255,255,255,0.45);
    box-shadow: 0 0 10px rgba(0,255,255,0.05), inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
    transition: color 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s, background 0.2s;
    display: block;
  }

  .nav-links li a::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; right: 15%;
    height: 40%;
    background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent);
    border-radius: 0 0 50% 50%;
    pointer-events: none;
  }

  .nav-links li a:hover {
    color: #fff;
    border-color: rgba(0,255,255,0.45);
    background: rgba(0,255,255,0.1);
    box-shadow: 0 0 20px rgba(0,255,255,0.2), inset 0 1px 0 rgba(255,255,255,0.12);
    transform: translateY(-2px) scale(1.04);
  }

  .nav-links li a.active {
    color: #ff00c8;
    border-color: rgba(255,0,200,0.5);
    background: rgba(255,0,200,0.1);
    box-shadow: 0 0 22px rgba(255,0,200,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .nav-links li:nth-child(even) a {
    border-color: rgba(255,0,200,0.18);
    background: rgba(255,0,200,0.04);
    box-shadow: 0 0 10px rgba(255,0,200,0.05), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .nav-links li:nth-child(even) a:hover {
    color: #fff;
    border-color: rgba(255,0,200,0.5);
    background: rgba(255,0,200,0.1);
    box-shadow: 0 0 20px rgba(255,0,200,0.22), inset 0 1px 0 rgba(255,255,255,0.12);
  }

  /* invisible spacer pill top center — no text, no border visible */
  .nav-spacer {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 48px; height: 48px;
    border-radius: 999px;
    background: transparent;
    border: none;
    pointer-events: none;
  }

  /* MAP EMBED WRAPPER */
  .map-wrap {
    position: relative; z-index: 1;
    flex: 1;
    margin: 0 24px 24px;
    border-radius: 24px;
    overflow: hidden;
    border: 1.5px solid rgba(0,255,255,0.15);
    box-shadow:
      0 0 40px rgba(0,255,255,0.08),
      0 0 80px rgba(255,0,200,0.06),
      0 8px 40px rgba(0,0,0,0.6);
    animation: fadeUp 1s cubic-bezier(0.34, 1.4, 0.64, 1) 0.15s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .map-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>

  <nav>
    <div class="nav-spacer"></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="map.html" class="active">Map</a></li>
      <li><a href="#">Places</a></li>
      <li><a href="#">Characters</a></li>
      <li><a href="#">Screenshots</a></li>
      <li><a href="#">Trailers</a></li>
    </ul>
  </nav>

  <div class="map-wrap">
    <iframe
      src="https://map.stateofleonida.net/"
      title="State of Leonida Map"
      allowfullscreen
      loading="lazy"
    ></iframe>
  </div>

</body>
</html>
