<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map — Leonida</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root { --cyan:#00ffff; --pink:#ff00c8; --purple:#7700ff; --bg:#04001a; }
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  min-height: 100vh;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  position: relative;
  background-image: url('leonida/images/others.jpg');
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
}

/* Dark overlay so the text stays readable over the bright art */
.bg-darken {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: rgba(4, 0, 26, 0.52);
}

/* Subtle colour tint that echoes the neon palette */
.bg-tint {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 55% at 12% 20%, rgba(0,255,255,0.08) 0%, transparent 100%),
    radial-gradient(ellipse 65% 50% at 88% 78%, rgba(255,0,200,0.09) 0%, transparent 100%);
}

/* Grid squares */
.bg-grid {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background-image:
    linear-gradient(rgba(0,255,255,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.07) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 85% 65% at center, black 10%, transparent 75%);
}

/* HAMBURGER */
.hamburger-btn {
  position: fixed; top: 22px; right: 26px; z-index: 200;
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(0,255,255,0.05);
  border: 1.5px solid rgba(0,255,255,0.25);
  box-shadow: 0 0 20px rgba(0,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.1);
  backdrop-filter: blur(16px); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  transition: all 0.3s ease;
  animation: fadeSlideIn 0.8s cubic-bezier(0.34,1.4,0.64,1) both;
}
@keyframes fadeSlideIn {
  from { opacity:0; transform:translateX(20px) scale(0.8); }
  to   { opacity:1; transform:translateX(0) scale(1); }
}
.hamburger-btn:hover {
  background: rgba(0,255,255,0.1); border-color: var(--cyan);
  box-shadow: 0 0 28px rgba(0,255,255,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
  transform: scale(1.08);
}
.hamburger-btn.open { background:rgba(255,0,200,0.08); border-color:rgba(255,0,200,0.3); box-shadow:0 0 28px rgba(255,0,200,0.2); }
.bar { width:20px; height:2px; border-radius:2px; background:var(--cyan); transition:transform 0.35s cubic-bezier(0.34,1.4,0.64,1),opacity 0.2s; transform-origin:center; }
.hamburger-btn.open .bar:nth-child(1) { transform:translateY(7px) rotate(45deg); background:var(--pink); }
.hamburger-btn.open .bar:nth-child(2) { opacity:0; transform:scaleX(0); }
.hamburger-btn.open .bar:nth-child(3) { transform:translateY(-7px) rotate(-45deg); background:var(--pink); }

/* NAV OVERLAY */
.nav-overlay {
  position: fixed; inset: 0; z-index: 150;
  pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
}
.nav-overlay.open { pointer-events: all; opacity: 1; }
.nav-backdrop {
  position: absolute; inset: 0;
  background: rgba(4,0,26,0.88); backdrop-filter: blur(24px);
}
.nav-panel {
  position: absolute; top: 0; right: 0;
  width: min(380px,100vw); height: 100%;
  background: linear-gradient(160deg, rgba(0,255,255,0.04), rgba(255,0,200,0.04));
  border-left: 1px solid rgba(0,255,255,0.12);
  box-shadow: -30px 0 80px rgba(0,0,0,0.5);
  transform: translateX(100%);
  transition: transform 0.5s cubic-bezier(0.34,1.2,0.64,1);
  display: flex; flex-direction: column; justify-content: center;
  padding: 80px 48px; overflow: hidden;
}
.nav-panel::before {
  content: ''; position: absolute; top: -80px; right: -80px;
  width: 360px; height: 360px;
  background: radial-gradient(circle, rgba(0,255,255,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.nav-panel::after {
  content: ''; position: absolute; bottom: -60px; left: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(255,0,200,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.nav-overlay.open .nav-panel { transform: translateX(0); }
.nav-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.4em;
  text-transform: uppercase; color: rgba(0,255,255,0.35); margin-bottom: 36px;
}
.nav-links { list-style: none; display: flex; flex-direction: column; gap: 2px; }
.nav-links li {
  opacity: 0; transform: translateX(28px);
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
}
.nav-overlay.open .nav-links li:nth-child(1){opacity:1;transform:none;transition-delay:.07s}
.nav-overlay.open .nav-links li:nth-child(2){opacity:1;transform:none;transition-delay:.12s}
.nav-overlay.open .nav-links li:nth-child(3){opacity:1;transform:none;transition-delay:.17s}
.nav-overlay.open .nav-links li:nth-child(4){opacity:1;transform:none;transition-delay:.22s}
.nav-overlay.open .nav-links li:nth-child(5){opacity:1;transform:none;transition-delay:.27s}
.nav-overlay.open .nav-links li:nth-child(6){opacity:1;transform:none;transition-delay:.32s}
.nav-links li a {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(36px,6vw,52px); font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.04em;
  text-decoration: none; color: rgba(255,255,255,0.18);
  display: block; padding: 9px 0; line-height: 1;
  transition: color 0.2s, letter-spacing 0.25s;
}
.nav-links li a:hover { color: #fff; letter-spacing: 0.08em; }
.nav-links li a.active { color: #fff; }
.nav-footer {
  position: absolute; bottom: 36px; left: 48px; right: 48px;
  padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: space-between;
  opacity: 0; transition: opacity 0.4s ease 0.38s;
}
.nav-overlay.open .nav-footer { opacity: 1; }
.nav-footer-text { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.18); }
.nav-footer-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--pink); box-shadow: 0 0 8px var(--pink);
  animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(0.55)} }

/* TITLE */
.title-block {
  position: relative; z-index: 5; text-align: center;
  animation: popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
}
.page-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.4em;
  text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 4px;
}
.page-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(36px, 5vw, 68px); font-weight: 900;
  text-transform: uppercase; line-height: 1;
  background: linear-gradient(90deg, #00ffff, #bf00ff, #ff00c8, #00e5ff, #00ffff);
  background-size: 300% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: textShimmer 8s linear infinite;
  filter: drop-shadow(0 2px 16px rgba(0,0,0,0.7)) drop-shadow(0 0 40px rgba(0,255,255,0.3));
}
@keyframes textShimmer { 0%{background-position:0%} 100%{background-position:300%} }

/* MAP */
.map-wrap {
  position: relative; z-index: 5;
  width: min(860px, 92vw);
  height: min(640px, 70vh);
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid rgba(0,255,255,0.18);
  box-shadow: 0 0 50px rgba(0,255,255,0.08), 0 0 100px rgba(255,0,200,0.05), 0 12px 50px rgba(0,0,0,0.7);
  animation: popIn 0.9s cubic-bezier(0.34,1.4,0.64,1) 0.1s both;
}
.map-wrap iframe {
  width: 133%;
  height: 133%;
  border: none;
  display: block;
  transform: scale(0.76);
  transform-origin: top left;
}

/* RIPPLE */
.ripple {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 4;
  border: 1.5px solid rgba(0,255,255,0.4);
  transform: translate(-50%,-50%) scale(0);
  animation: rippleOut 0.9s cubic-bezier(0.2,0.8,0.4,1) forwards;
}
@keyframes rippleOut {
  0%  { transform: translate(-50%,-50%) scale(0); opacity: 0.7; }
  100%{ transform: translate(-50%,-50%) scale(3.5); opacity: 0; }
}

@keyframes popIn {
  from { opacity:0; transform:scale(0.97) translateY(12px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

@media (max-width:500px) {
  .map-wrap { width:92vw; height:62vw; border-radius:12px; }
  .nav-panel { padding:70px 28px; }
}
</style>
</head>
<body>

<div class="bg-darken"></div>
<div class="bg-tint"></div>
<div class="bg-grid"></div>

<button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</button>

<div class="nav-overlay" id="navOverlay">
  <div class="nav-backdrop" id="navBackdrop"></div>
  <div class="nav-panel">
    <div class="nav-label">Navigation</div>
    <ul class="nav-links">
      <li><a href="index">Home</a></li>
      <li><a href="#" class="active">Map</a></li>
      <li><a href="places">Places</a></li>
      <li><a href="characters">Characters</a></li>
      <li><a href="screenshots">Screenshots</a></li>
      <li><a href="trailers">Trailers</a></li>
    </ul>
    <div class="nav-footer">
      <span class="nav-footer-text">November 19, 2026</span>
      <div class="nav-footer-dot"></div>
    </div>
  </div>
</div>

<div class="title-block">
  <div class="page-label">Explore</div>
  <div class="page-title">State of Leonida</div>
</div>

<div class="map-wrap">
  <iframe src="https://map.stateofleonida.net/" title="State of Leonida Map" allowfullscreen loading="lazy"></iframe>
</div>

<script>
/* RIPPLES */
document.addEventListener('click', e => {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX+'px'; r.style.top = e.clientY+'px';
  r.style.width = r.style.height = '70px';
  r.style.borderColor = Math.random()>.5 ? 'rgba(255,0,200,0.5)' : 'rgba(0,255,255,0.5)';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(), 950);
});

const hBtn = document.getElementById('hamburgerBtn');
const overlay = document.getElementById('navOverlay');
const backdrop = document.getElementById('navBackdrop');
function toggleMenu(){
  const open = overlay.classList.toggle('open');
  hBtn.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
}
hBtn.addEventListener('click', toggleMenu);
backdrop.addEventListener('click', toggleMenu);
document.addEventListener('keydown', e => { if(e.key==='Escape' && overlay.classList.contains('open')) toggleMenu(); });
</script>
</body>
</html>
