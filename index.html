<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Leonida</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #04001a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* static gradient bg only, no moving elements */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(0,255,255,0.13) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 75%, rgba(255,0,200,0.15) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, rgba(90,0,200,0.07) 0%, transparent 55%);
  }

  /* subtle static grid */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }

  /* TITLE */
  .title-wrap {
    position: relative; z-index: 1;
    text-align: center;
    animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .welcome-small {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.38);
    margin-bottom: 4px;
  }

  .leonida-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(60px, 11vw, 120px);
    font-weight: 900;
    text-transform: uppercase;
    line-height: 0.9;
    background: linear-gradient(90deg, #00ffff, #bf00ff, #ff00c8, #00e5ff, #00ffff);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: textShimmer 4s linear infinite;
    filter: drop-shadow(0 0 28px rgba(0,255,255,0.3)) drop-shadow(0 0 50px rgba(255,0,200,0.18));
  }

  @keyframes textShimmer {
    0%   { background-position: 0% }
    100% { background-position: 300% }
  }

  /* PILLS */
  .pills {
    position: relative; z-index: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
  }

  .pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 26px 12px;
    border-radius: 999px;
    background: rgba(0, 255, 255, 0.05);
    border: 1.5px solid rgba(0, 255, 255, 0.3);
    box-shadow:
      0 0 20px rgba(0, 255, 255, 0.08),
      inset 0 1px 0 rgba(255,255,255,0.1),
      0 6px 24px rgba(0,0,0,0.5);
    backdrop-filter: blur(14px);
    position: relative;
    overflow: hidden;
    min-width: 80px;
  }

  .pill.pk {
    background: rgba(255, 0, 200, 0.05);
    border-color: rgba(255, 0, 200, 0.3);
    box-shadow:
      0 0 20px rgba(255, 0, 200, 0.08),
      inset 0 1px 0 rgba(255,255,255,0.1),
      0 6px 24px rgba(0,0,0,0.5);
  }

  /* glassy top shine */
  .pill::before {
    content: '';
    position: absolute;
    top: 0; left: 18%; right: 18%;
    height: 35%;
    background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent);
    border-radius: 0 0 50% 50%;
    pointer-events: none;
  }

  .pill-num {
    font-family: 'Nunito', sans-serif;
    font-size: 36px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(160deg, #00ffff 0%, #7700ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    min-width: 54px;
    text-align: center;
    display: block;
  }

  .pk .pill-num {
    background: linear-gradient(160deg, #ff00c8 0%, #7700ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .pill-lbl {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    margin-top: 3px;
  }

  /* animated separator */
  .sep {
    font-family: 'Nunito', sans-serif;
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(180deg, #00ffff, #ff00c8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0.45;
    margin-bottom: 12px;
    animation: sepBlink 1s ease-in-out infinite;
  }

  @keyframes sepBlink {
    0%, 100% { opacity: 0.45; }
    50%       { opacity: 0.1; }
  }

  /* bounce on tick */
  .bounce {
    animation: numBounce 0.4s cubic-bezier(0.34, 1.8, 0.64, 1);
  }

  @keyframes numBounce {
    0%   { transform: scale(1.4) translateY(-5px); }
    60%  { transform: scale(0.93) translateY(2px); }
    100% { transform: scale(1) translateY(0); }
  }

  /* date subtitle */
  .subtitle {
    position: relative; z-index: 1;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.22);
    text-align: center;
    animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  }

  .subtitle span { color: #ff00c8; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.75) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* NAVBAR — no bg, just floating */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px 36px;
    background: none;
    border: none;
    animation: slideDown 0.8s cubic-bezier(0.34, 1.4, 0.64, 1) both;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .nav-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: linear-gradient(90deg, #00ffff, #ff00c8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 10px rgba(0,255,255,0.4));
    cursor: pointer;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 8px;
    list-style: none;
  }

  .nav-links li a {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 10px 22px;
    border-radius: 999px;
    border: 1.5px solid rgba(0,255,255,0.18);
    background: rgba(0,255,255,0.04);
    color: rgba(255,255,255,0.45);
    box-shadow:
      0 0 10px rgba(0,255,255,0.05),
      inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
    transition: color 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s, background 0.2s;
    display: block;
  }

  /* glassy shine on each nav pill */
  .nav-links li a::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; right: 15%;
    height: 40%;
    background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent);
    border-radius: 0 0 50% 50%;
    pointer-events: none;
  }

  .nav-links li a:hover {
    color: #fff;
    border-color: rgba(0,255,255,0.45);
    background: rgba(0,255,255,0.1);
    box-shadow: 0 0 20px rgba(0,255,255,0.2), inset 0 1px 0 rgba(255,255,255,0.12);
    transform: translateY(-2px) scale(1.04);
  }

  .nav-links li a.active {
    color: #00ffff;
    border-color: rgba(0,255,255,0.5);
    background: rgba(0,255,255,0.1);
    box-shadow: 0 0 22px rgba(0,255,255,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  /* alternate pink pills every other item */
  .nav-links li:nth-child(even) a {
    border-color: rgba(255,0,200,0.18);
    background: rgba(255,0,200,0.04);
    box-shadow:
      0 0 10px rgba(255,0,200,0.05),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .nav-links li:nth-child(even) a:hover {
    color: #fff;
    border-color: rgba(255,0,200,0.5);
    background: rgba(255,0,200,0.1);
    box-shadow: 0 0 20px rgba(255,0,200,0.22), inset 0 1px 0 rgba(255,255,255,0.12);
  }

  .nav-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .nav-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #00ffff;
    box-shadow: 0 0 8px #00ffff;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.25; }
  }
</style>
</head>
<body>

  <nav>
    <ul class="nav-links">
      <li><a href="#" class="active">Home</a></li>
      <li><a href="map">Map</a></li>
      <li><a href="#">Places</a></li>
      <li><a href="#">Characters</a></li>
      <li><a href="#">Screenshots</a></li>
      <li><a href="#">Trailers</a></li>
    </ul>
  </nav>

  <div class="title-wrap">
    <div class="welcome-small">Welcome to</div>
    <div class="leonida-text">Leonida</div>
  </div>

  <div class="pills">
    <div class="pill" id="pill-d">
      <span class="pill-num" id="n-d">000</span>
      <span class="pill-lbl">Days</span>
    </div>

    <div class="sep">:</div>

    <div class="pill pk" id="pill-h">
      <span class="pill-num" id="n-h">00</span>
      <span class="pill-lbl">Hours</span>
    </div>

    <div class="sep">:</div>

    <div class="pill" id="pill-m">
      <span class="pill-num" id="n-m">00</span>
      <span class="pill-lbl">Mins</span>
    </div>

    <div class="sep">:</div>

    <div class="pill pk" id="pill-s">
      <span class="pill-num" id="n-s">00</span>
      <span class="pill-lbl">Secs</span>
    </div>
  </div>

  <div class="subtitle">Release · <span>November 19, 2026</span> · PS5 · Xbox Series X|S</div>

<script>
  const prev = { d:'', h:'', m:'', s:'' };

  function bounce(id) {
    const el = document.getElementById('n-' + id);
    el.classList.remove('bounce');
    void el.offsetWidth;
    el.classList.add('bounce');
    setTimeout(() => el.classList.remove('bounce'), 450);
  }

  function tick() {
    const target = new Date('2026-11-19T00:00:00');
    const diff   = target - new Date();

    if (diff <= 0) {
      ['d','h','m','s'].forEach(k => document.getElementById('n-'+k).textContent = '00');
      return;
    }

    const d = String(Math.floor(diff / 86400000)).padStart(3, '0');
    const h = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
    const m = String(Math.floor((diff % 3600000)  / 60000)).padStart(2, '0');
    const s = String(Math.floor((diff % 60000)    / 1000)).padStart(2, '0');

    if (d !== prev.d) { document.getElementById('n-d').textContent = d; bounce('d'); prev.d = d; }
    if (h !== prev.h) { document.getElementById('n-h').textContent = h; bounce('h'); prev.h = h; }
    if (m !== prev.m) { document.getElementById('n-m').textContent = m; bounce('m'); prev.m = m; }
    if (s !== prev.s) { document.getElementById('n-s').textContent = s; bounce('s'); prev.s = s; }
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
