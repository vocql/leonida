<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Leonida</title>

  <meta name="description" content="The neon-lit gateway to Leonida. Live countdown, both official trailers, the full interactive map, character bios, location breakdowns & more. The wait ends November 19, 2026.">
  <link rel="canonical" href="https://voqcl.xyz">

  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://vocql.github.io/leonida/">
  <meta property="og:title"       content="Welcome to Leonida 🌊🌅✨">
  <meta property="og:description" content="The neon-lit gateway to Leonida. Live countdown, both official trailers, the full interactive map, character bios & more. November 19, 2026 — don't miss a second.">
  <meta property="og:image"        content="https://vocql.github.io/leonida/leonida/images/leonida.png">
  <meta name="theme-color" content="#ff4dd2">
  <meta name="robots" content="index, follow">
  <meta name="keywords" content="GTA 6, GTA VI, Grand Theft Auto 6, countdown, release date, Leonida, Vice City, trailers, November 2026">
  <meta name="author" content="VOCQL">
  <link rel="icon" href="leonida/images/leonida.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --cyan: #00ffff;
    --pink: #ff00c8;
    --purple: #7700ff;
    --bg: #04001a;
    --glass-c: rgba(0,255,255,0.06);
    --glass-p: rgba(255,0,200,0.06);
    --border-c: rgba(0,255,255,0.25);
    --border-p: rgba(255,0,200,0.25);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    position: relative;
    cursor: default;
  }

  /* ── BACKGROUND LAYERS ── */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  .bg-glow {
    background:
      radial-gradient(ellipse at 12% 18%, rgba(0,255,255,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 88% 78%, rgba(255,0,200,0.17) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(90,0,200,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 60% 10%, rgba(0,255,255,0.06) 0%, transparent 35%),
      radial-gradient(ellipse at 25% 85%, rgba(255,0,200,0.07) 0%, transparent 35%);
  }

  .bg-grid {
    background-image:
      linear-gradient(rgba(0,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.035) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 90% 70% at center, black 20%, transparent 80%);
    animation: gridPulse 8s ease-in-out infinite;
  }

  @keyframes gridPulse {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 0.4; }
  }

  /* Moving scan line */
  .bg-scanline {
    background: linear-gradient(
      180deg,
      transparent 0%,
      transparent 48%,
      rgba(0,255,255,0.025) 50%,
      transparent 52%,
      transparent 100%
    );
    background-size: 100% 8px;
    animation: scanMove 12s linear infinite;
  }

  @keyframes scanMove {
    0%   { background-position: 0 0; }
    100% { background-position: 0 100vh; }
  }

  /* Floating particles */
  .particles {
    position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
  }

  /* ── HAMBURGER NAV ── */
  .hamburger-btn {
    position: fixed;
    top: 24px;
    right: 28px;
    z-index: 200;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(0,255,255,0.06);
    border: 1.5px solid var(--border-c);
    box-shadow: 0 0 20px rgba(0,255,255,0.12), inset 0 1px 0 rgba(255,255,255,0.1);
    backdrop-filter: blur(16px);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.2s;
    animation: slideIn 0.8s cubic-bezier(0.34, 1.4, 0.64, 1) both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px) scale(0.8); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }

  .hamburger-btn:hover {
    background: rgba(0,255,255,0.12);
    border-color: var(--cyan);
    box-shadow: 0 0 30px rgba(0,255,255,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
    transform: scale(1.08);
  }

  .hamburger-btn.open {
    background: rgba(255,0,200,0.08);
    border-color: var(--border-p);
    box-shadow: 0 0 30px rgba(255,0,200,0.2), inset 0 1px 0 rgba(255,255,255,0.12);
  }

  .bar {
    width: 20px;
    height: 2px;
    border-radius: 2px;
    background: var(--cyan);
    transition: transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.2s, width 0.25s;
    transform-origin: center;
  }

  .hamburger-btn.open .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); background: var(--pink); }
  .hamburger-btn.open .bar:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger-btn.open .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background: var(--pink); }

  /* ── MENU OVERLAY ── */
  .nav-overlay {
    position: fixed;
    inset: 0;
    z-index: 150;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .nav-overlay.open {
    pointer-events: all;
    opacity: 1;
  }

  .nav-backdrop {
    position: absolute; inset: 0;
    background: rgba(4,0,26,0.88);
    backdrop-filter: blur(20px);
  }

  .nav-panel {
    position: absolute;
    top: 0; right: 0;
    width: min(380px, 100vw);
    height: 100%;
    background: linear-gradient(135deg, rgba(0,255,255,0.04) 0%, rgba(255,0,200,0.04) 100%);
    border-left: 1px solid rgba(0,255,255,0.15);
    box-shadow: -20px 0 60px rgba(0,0,0,0.6), inset 1px 0 0 rgba(0,255,255,0.08);
    transform: translateX(100%);
    transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 48px;
    overflow: hidden;
  }

  .nav-panel::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(0,255,255,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .nav-panel::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,0,200,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .nav-overlay.open .nav-panel {
    transform: translateX(0);
  }

  .nav-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(0,255,255,0.4);
    margin-bottom: 40px;
  }

  .nav-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-links li {
    opacity: 0;
    transform: translateX(30px);
    transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
  }

  .nav-overlay.open .nav-links li:nth-child(1) { opacity: 1; transform: translateX(0); transition-delay: 0.08s; }
  .nav-overlay.open .nav-links li:nth-child(2) { opacity: 1; transform: translateX(0); transition-delay: 0.13s; }
  .nav-overlay.open .nav-links li:nth-child(3) { opacity: 1; transform: translateX(0); transition-delay: 0.18s; }
  .nav-overlay.open .nav-links li:nth-child(4) { opacity: 1; transform: translateX(0); transition-delay: 0.23s; }
  .nav-overlay.open .nav-links li:nth-child(5) { opacity: 1; transform: translateX(0); transition-delay: 0.28s; }
  .nav-overlay.open .nav-links li:nth-child(6) { opacity: 1; transform: translateX(0); transition-delay: 0.33s; }

  .nav-links li a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(36px, 6vw, 52px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    text-decoration: none;
    color: rgba(255,255,255,0.22);
    display: block;
    padding: 10px 0;
    line-height: 1;
    transition: color 0.2s, letter-spacing 0.25s;
    position: relative;
  }

  .nav-links li a::after {
    content: '';
    position: absolute;
    left: 0; bottom: 8px;
    width: 0; height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--pink));
    transition: width 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
    border-radius: 2px;
  }

  .nav-links li a:hover {
    color: #fff;
    letter-spacing: 0.08em;
  }

  .nav-links li a:hover::after { width: 100%; }

  .nav-links li:nth-child(odd) a:hover { color: var(--cyan); text-shadow: 0 0 24px rgba(0,255,255,0.4); }
  .nav-links li:nth-child(even) a:hover { color: var(--pink); text-shadow: 0 0 24px rgba(255,0,200,0.4); }

  .nav-links li a.active { color: var(--cyan); }
  .nav-links li a.active::after { width: 40%; }

  .nav-footer {
    position: absolute;
    bottom: 40px;
    left: 48px;
    right: 48px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    transition: opacity 0.4s ease 0.4s;
  }

  .nav-overlay.open .nav-footer { opacity: 1; }

  .nav-footer-text {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
  }

  .nav-footer-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--pink);
    box-shadow: 0 0 8px var(--pink);
    animation: dotPulse 2s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.6); }
  }

  /* ── LOGO ── */
  .title-wrap {
    position: relative; z-index: 1;
    text-align: center;
    animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .welcome-small {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 6px;
  }

  .leonida-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(72px, 13vw, 140px);
    font-weight: 900;
    text-transform: uppercase;
    line-height: 0.88;
    background: linear-gradient(90deg, #00ffff, #bf00ff, #ff00c8, #00e5ff, #00ffff);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: textShimmer 4s linear infinite;
    filter: drop-shadow(0 0 40px rgba(0,255,255,0.3)) drop-shadow(0 0 70px rgba(255,0,200,0.18));
    position: relative;
  }

  /* Glitch effect */
  .leonida-text::before,
  .leonida-text::after {
    content: 'LEONIDA';
    position: absolute;
    inset: 0;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .leonida-text::before {
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    left: 2px;
    animation: glitch1 6s infinite;
    clip-path: polygon(0 20%, 100% 20%, 100% 45%, 0 45%);
  }

  .leonida-text::after {
    background: linear-gradient(90deg, var(--pink), var(--purple));
    left: -2px;
    animation: glitch2 6s infinite;
    clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
  }

  @keyframes glitch1 {
    0%, 92%, 100% { opacity: 0; transform: translateX(0); }
    93% { opacity: 0.6; transform: translateX(-3px); }
    94% { opacity: 0; }
    95% { opacity: 0.5; transform: translateX(3px); }
    96% { opacity: 0; }
  }

  @keyframes glitch2 {
    0%, 94%, 100% { opacity: 0; transform: translateX(0); }
    95% { opacity: 0.5; transform: translateX(3px); }
    96% { opacity: 0; }
    97% { opacity: 0.4; transform: translateX(-2px); }
    98% { opacity: 0; }
  }

  @keyframes textShimmer {
    0%   { background-position: 0% }
    100% { background-position: 300% }
  }

  /* ── COUNTDOWN ── */
  .pills {
    position: relative; z-index: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
  }

  .pill {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 28px 14px;
    border-radius: 16px;
    background: rgba(0,255,255,0.05);
    border: 1px solid rgba(0,255,255,0.2);
    box-shadow:
      0 0 30px rgba(0,255,255,0.07),
      inset 0 1px 0 rgba(255,255,255,0.1),
      0 8px 32px rgba(0,0,0,0.5);
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
    min-width: 88px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .pill:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 40px rgba(0,255,255,0.15), inset 0 1px 0 rgba(255,255,255,0.15), 0 12px 40px rgba(0,0,0,0.6);
  }

  .pill.pk {
    background: rgba(255,0,200,0.05);
    border-color: rgba(255,0,200,0.2);
    box-shadow: 0 0 30px rgba(255,0,200,0.07), inset 0 1px 0 rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.5);
  }

  .pill.pk:hover {
    box-shadow: 0 0 40px rgba(255,0,200,0.15), inset 0 1px 0 rgba(255,255,255,0.15), 0 12px 40px rgba(0,0,0,0.6);
  }

  /* Top shine */
  .pill::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  }

  /* Bottom glow bar */
  .pill::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.4;
  }

  .pill.pk::after {
    background: linear-gradient(90deg, transparent, var(--pink), transparent);
  }

  .pill-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 44px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(160deg, #00ffff 0%, #7700ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    min-width: 54px;
    text-align: center;
    display: block;
    letter-spacing: -0.02em;
    filter: drop-shadow(0 0 12px rgba(0,255,255,0.4));
  }

  .pk .pill-num {
    background: linear-gradient(160deg, #ff00c8 0%, #7700ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(255,0,200,0.4));
  }

  .pill-lbl {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-top: 4px;
  }

  .sep {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 900;
    background: linear-gradient(180deg, #00ffff, #ff00c8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0.5;
    margin-bottom: 16px;
    animation: sepBlink 1s ease-in-out infinite;
    user-select: none;
  }

  @keyframes sepBlink {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 0.12; }
  }

  .bounce {
    animation: numBounce 0.45s cubic-bezier(0.34, 1.8, 0.64, 1);
  }

  @keyframes numBounce {
    0%   { transform: scale(1.5) translateY(-6px); }
    60%  { transform: scale(0.9) translateY(2px); }
    100% { transform: scale(1) translateY(0); }
  }

  /* ── SUBTITLE ── */
  .subtitle-wrap {
    position: relative; z-index: 1;
    text-align: center;
    animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  }

  .subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .subtitle-divider {
    width: 30px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  }

  .subtitle span.date {
    color: var(--pink);
    text-shadow: 0 0 16px rgba(255,0,200,0.35);
  }

  /* ── PLATFORM BADGES ── */
  .platforms {
    position: relative; z-index: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.45s both;
  }

  .platform-badge {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.03);
    transition: border-color 0.2s, color 0.2s;
  }

  .platform-badge:hover {
    border-color: rgba(0,255,255,0.3);
    color: var(--cyan);
  }

  /* ── CORNER ACCENTS ── */
  .corner {
    position: fixed;
    z-index: 1;
    width: 50px; height: 50px;
    pointer-events: none;
  }

  .corner-tl { top: 20px; left: 20px; border-top: 2px solid rgba(0,255,255,0.3); border-left: 2px solid rgba(0,255,255,0.3); border-radius: 4px 0 0 0; }
  .corner-tr { top: 20px; right: 20px; border-top: 2px solid rgba(255,0,200,0.3); border-right: 2px solid rgba(255,0,200,0.3); border-radius: 0 4px 0 0; }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid rgba(0,255,255,0.3); border-left: 2px solid rgba(0,255,255,0.3); border-radius: 0 0 0 4px; }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid rgba(255,0,200,0.3); border-right: 2px solid rgba(255,0,200,0.3); border-radius: 0 0 4px 0; }

  /* ── STATUS BAR ── */
  .status-bar {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
    animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s both;
  }

  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: dotPulse 2s ease-in-out infinite;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.75) translateY(14px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 500px) {
    .pills { gap: 7px; }
    .pill { min-width: 68px; padding: 14px 16px 12px; }
    .pill-num { font-size: 34px; }
    .sep { font-size: 26px; }
    .corner { width: 30px; height: 30px; }
    .nav-panel { padding: 70px 32px; }
  }
</style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg-layer bg-glow"></div>
  <div class="bg-layer bg-grid"></div>
  <div class="bg-layer bg-scanline"></div>
  <div class="particles" id="particles"></div>

  <!-- Corner accents -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Hamburger button -->
  <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </button>

  <!-- Nav overlay -->

      <span class="pill-num" id="n-d">000</span>
      <span class="pill-lbl">Days</span>
    </div>
    <div class="sep">:</div>
    <div class="pill pk" id="pill-h">
      <span class="pill-num" id="n-h">00</span>
      <span class="pill-lbl">Hours</span>
    </div>
    <div class="sep">:</div>
    <div class="pill" id="pill-m">
      <span class="pill-num" id="n-m">00</span>
      <span class="pill-lbl">Mins</span>
    </div>

      <span class="pill-num" id="n-s">00</span>
      <span class="pill-lbl">Secs</span>
    </div>

  <!-- Status bar -->

    <div class="status-dot"></div>
    Live countdown
  </div>

<script>
  /* ── PARTICLES ── */
  const container = document.getElementById('particles');
  const colors = ['#00ffff', '#ff00c8', '#7700ff', '#ffffff'];
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = Math.random() * 2.5 + 1;
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      background: ${color};
      box-shadow: 0 0 ${size * 3}px ${color};
      --drift: ${(Math.random() - 0.5) * 120}px;
      animation-duration: ${Math.random() * 18 + 10}s;
      animation-delay: -${Math.random() * 20}s;
    `;
    container.appendChild(p);
  }

  /* ── HAMBURGER ── */
  const btn = document.getElementById('hamburgerBtn');
  const overlay = document.getElementById('navOverlay');
  const backdrop = document.getElementById('navBackdrop');

  function toggleMenu() {
    const isOpen = overlay.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';
  }

  btn.addEventListener('click', toggleMenu);
  backdrop.addEventListener('click', toggleMenu);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('open')) toggleMenu();
  });

  /* ── COUNTDOWN ── */
  const prev = { d:'', h:'', m:'', s:'' };

  function bounce(id) {
    const el = document.getElementById('n-' + id);
    el.classList.remove('bounce');
    void el.offsetWidth;
    el.classList.add('bounce');
    setTimeout(() => el.classList.remove('bounce'), 500);
  }

  function tick() {
    const target = new Date('2026-11-19T00:00:00');
    const diff   = target - new Date();

    if (diff <= 0) {
      ['d','h','m','s'].forEach(k => document.getElementById('n-'+k).textContent = '00');
      return;
    }

    const d = String(Math.floor(diff / 86400000)).padStart(3, '0');
    const h = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
    const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
    const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');

    if (d !== prev.d) { document.getElementById('n-d').textContent = d; bounce('d'); prev.d = d; }
    if (h !== prev.h) { document.getElementById('n-h').textContent = h; bounce('h'); prev.h = h; }
    if (m !== prev.m) { document.getElementById('n-m').textContent = m; bounce('m'); prev.m = m; }
    if (s !== prev.s) { document.getElementById('n-s').textContent = s; bounce('s'); prev.s = s; }
  }

  tick();
  setInterval(tick, 1000);
</script>
