<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Places — Leonida</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #04001a;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(0,255,255,0.13) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 75%, rgba(255,0,200,0.15) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, rgba(90,0,200,0.07) 0%, transparent 55%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    pointer-events: none;
  }

  /* ── Nav ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 22px 36px;
    animation: slideDown 0.8s cubic-bezier(0.34, 1.4, 0.64, 1) both;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .nav-links { display: flex; align-items: center; gap: 8px; list-style: none; }

  .nav-links li a {
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 900;
    letter-spacing: 0.15em; text-transform: uppercase;
    text-decoration: none; padding: 10px 22px;
    border-radius: 999px;
    border: 1.5px solid rgba(0,255,255,0.18);
    background: rgba(0,255,255,0.04);
    color: rgba(255,255,255,0.45);
    box-shadow: 0 0 10px rgba(0,255,255,0.05), inset 0 1px 0 rgba(255,255,255,0.08);
    position: relative; overflow: hidden;
    transition: color 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s, background 0.2s;
    display: block;
  }

  .nav-links li a::before {
    content: ''; position: absolute;
    top: 0; left: 15%; right: 15%; height: 40%;
    background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent);
    border-radius: 0 0 50% 50%; pointer-events: none;
  }

  .nav-links li a:hover {
    color: #fff; border-color: rgba(0,255,255,0.45);
    background: rgba(0,255,255,0.1);
    box-shadow: 0 0 20px rgba(0,255,255,0.2), inset 0 1px 0 rgba(255,255,255,0.12);
    transform: translateY(-2px) scale(1.04);
  }

  .nav-links li a.active {
    color: #00ffff; border-color: rgba(0,255,255,0.5);
    background: rgba(0,255,255,0.1);
    box-shadow: 0 0 22px rgba(0,255,255,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .nav-links li:nth-child(even) a {
    border-color: rgba(255,0,200,0.18); background: rgba(255,0,200,0.04);
    box-shadow: 0 0 10px rgba(255,0,200,0.05), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .nav-links li:nth-child(even) a:hover {
    color: #fff; border-color: rgba(255,0,200,0.5);
    background: rgba(255,0,200,0.1);
    box-shadow: 0 0 20px rgba(255,0,200,0.22), inset 0 1px 0 rgba(255,255,255,0.12);
  }

  /* ── Main ── */
  main {
    position: relative; z-index: 1;
    padding: 110px 40px 80px;
    max-width: 1400px; margin: 0 auto;
  }

  /* ── Page header ── */
  .page-header {
    display: flex; align-items: flex-end;
    justify-content: space-between; margin-bottom: 36px;
    animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .eyebrow {
    font-size: 11px; font-weight: 800;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(255,255,255,0.28); margin-bottom: 4px;
  }

  .page-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(36px, 6vw, 72px); font-weight: 900;
    text-transform: uppercase; line-height: 0.9;
    background: linear-gradient(90deg, #00ffff, #bf00ff, #ff00c8, #00e5ff, #00ffff);
    background-size: 300% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: textShimmer 4s linear infinite;
    filter: drop-shadow(0 0 20px rgba(0,255,255,0.25));
  }

  @keyframes textShimmer { 0% { background-position: 0% } 100% { background-position: 300% } }

  .count-badge {
    font-size: 11px; font-weight: 900;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.22); padding: 8px 16px;
    border-radius: 999px; border: 1.5px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
  }

  .count-badge span {
    color: #00ffff;
    text-shadow: 0 0 12px rgba(0,255,255,0.6);
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; border-radius: 12px;
    border: 1.5px solid rgba(0,255,255,0.12);
    background: rgba(0,255,255,0.02);
    margin-bottom: 32px;
    animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
  }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.15); flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .status-dot.loading { background: #ffcc00; box-shadow: 0 0 8px #ffcc00; animation: blink 0.8s ease-in-out infinite; }
  .status-dot.ok      { background: #00ffff; box-shadow: 0 0 8px #00ffff; animation: blink 2s ease-in-out infinite; }
  .status-dot.err     { background: #ff3040; box-shadow: 0 0 8px #ff3040; }

  .status-text {
    font-size: 12px; font-weight: 800; font-family: monospace;
    color: rgba(255,255,255,0.25); flex: 1; transition: color 0.3s;
  }

  .status-text.ok  { color: rgba(0,255,255,0.6); }
  .status-text.err { color: rgba(255,80,80,0.6); }

  /* ── Empty state ── */
  .empty {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; padding: 80px 20px; text-align: center;
  }

  .empty-icon { font-size: 40px; opacity: 0.3; }

  .empty-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 900; text-transform: uppercase;
    color: rgba(255,255,255,0.18); letter-spacing: 0.05em;
  }

  .empty-sub {
    font-size: 11px; font-weight: 800;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.1); max-width: 340px; line-height: 1.9;
  }

  .empty-sub code {
    color: rgba(0,255,255,0.4); background: rgba(0,255,255,0.06);
    padding: 2px 7px; border-radius: 4px;
    letter-spacing: 0; text-transform: none; font-size: 11px;
  }

  /* ── Grid ── */
  .places-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }

  /* ── Card ── */
  .gallery-item {
    border-radius: 14px; overflow: hidden;
    border: 1.5px solid rgba(0,255,255,0.12);
    background: rgba(0,255,255,0.03);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    cursor: pointer;
    opacity: 0; transform: scale(0.9) translateY(14px);
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s,
                opacity 0.45s ease, transform 0.45s cubic-bezier(0.34,1.4,0.64,1);
  }

  .gallery-item.visible { opacity: 1; transform: scale(1) translateY(0); }

  .gallery-item:hover {
    transform: translateY(-4px) scale(1.01) !important;
    border-color: rgba(0,255,255,0.35);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,255,0.08);
  }

  .gallery-item:nth-child(even) {
    border-color: rgba(255,0,200,0.12); background: rgba(255,0,200,0.03);
  }

  .gallery-item:nth-child(even):hover {
    border-color: rgba(255,0,200,0.35);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(255,0,200,0.08);
  }

  .card-img-wrap {
    position: relative; width: 100%;
    aspect-ratio: 16/9; overflow: hidden;
    background: rgba(255,255,255,0.04);
  }

  .card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: transform 0.4s ease;
  }

  .gallery-item:hover .card-img-wrap img { transform: scale(1.06); }

  .card-img-wrap::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(4,0,26,0.7) 0%, transparent 50%);
    pointer-events: none;
  }

  .card-num {
    position: absolute; top: 10px; left: 12px; z-index: 2;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 900;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.5); background: rgba(4,0,26,0.6);
    padding: 4px 10px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
  }

  .card-body { padding: 14px 16px 16px; }

  .card-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: rgba(255,255,255,0.85);
    line-height: 1; margin-bottom: 6px;
  }

  .card-file {
    font-size: 10px; font-weight: 800;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.18); font-family: monospace;
  }

  /* ── Lightbox ── */
  #ssViewer {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(4,0,26,0.97);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    backdrop-filter: blur(20px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }

  #ssViewer.active { opacity: 1; pointer-events: all; }

  /* ── Two-column inner layout ── */
  .viewer-inner {
    display: flex;
    align-items: flex-start;
    gap: 40px;
    max-width: 1140px;
    width: 100%;
    max-height: 88vh;
  }

  /* ── Image column ── */
  .viewer-img-col {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #ssImg {
    max-width: 560px;
    max-height: 520px;
    width: auto;
    height: auto;
    border-radius: 12px;
    border: 1.5px solid rgba(0,255,255,0.2);
    box-shadow: 0 0 60px rgba(0,255,255,0.12);
    object-fit: contain;
    transition: opacity 0.15s;
    display: block;
  }

  .lb-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.3); margin-top: 12px;
    text-align: center;
  }

  .viewer-controls {
    display: flex; align-items: center; gap: 20px;
    margin-top: 16px;
  }

  .viewer-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 900;
    color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 999px; padding: 8px 22px;
    cursor: pointer; letter-spacing: 0.08em;
    transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.15s;
  }

  .viewer-btn:hover {
    color: #fff; border-color: rgba(0,255,255,0.4);
    background: rgba(0,255,255,0.08);
    transform: scale(1.08);
  }

  .viewer-counter {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 900;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    min-width: 80px; text-align: center;
  }

  .viewer-counter span { color: #00ffff; }

  /* ── Info / description column ── */
  .viewer-bio-col {
    flex: 1 1 0;
    min-width: 0;
    max-height: 560px;
    overflow-y: auto;
    padding-right: 6px;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,255,255,0.2) transparent;
  }

  .viewer-bio-col::-webkit-scrollbar { width: 4px; }
  .viewer-bio-col::-webkit-scrollbar-track { background: transparent; }
  .viewer-bio-col::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.2); border-radius: 4px; }

  .bio-wrap {
    background: rgba(0,255,255,0.035);
    border: 1.5px solid rgba(0,255,255,0.13);
    border-radius: 16px;
    padding: 26px 24px 28px;
    transition: opacity 0.2s;
  }

  .bio-eyebrow {
    font-size: 10px; font-weight: 900;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: rgba(0,255,255,0.45); margin-bottom: 6px;
  }

  .bio-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 34px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: #fff; line-height: 1;
    margin-bottom: 14px;
  }

  .bio-tag {
    display: inline-block;
    font-size: 10px; font-weight: 900;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,200,0,0.75);
    background: rgba(255,200,0,0.07);
    border: 1px solid rgba(255,200,0,0.2);
    border-radius: 999px; padding: 5px 14px;
    margin-bottom: 18px;
  }

  .bio-divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, rgba(0,255,255,0.2), transparent);
    margin-bottom: 18px;
  }

  .bio-quote {
    font-size: 13.5px; font-weight: 800; font-style: italic;
    color: rgba(0,255,255,0.6);
    border-left: 2px solid rgba(0,255,255,0.3);
    padding-left: 14px; margin-bottom: 18px;
    line-height: 1.65;
  }

  .bio-text {
    font-size: 13px; font-weight: 800;
    color: rgba(255,255,255,0.48);
    line-height: 1.8;
  }

  .bio-text p { margin-bottom: 12px; }
  .bio-text p:last-child { margin-bottom: 0; }

  .bio-no-info {
    font-size: 12px; font-weight: 800;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 30px 0; text-align: center;
  }

  #ssClose {
    position: fixed; top: 20px; right: 24px;
    font-size: 24px; color: rgba(255,255,255,0.4);
    cursor: pointer; background: none; border: none;
    font-family: 'Nunito', sans-serif; font-weight: 900;
    transition: color 0.15s; z-index: 1001;
  }

  #ssClose:hover { color: #fff; }

  @keyframes popIn  { from { opacity: 0; transform: scale(0.85) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes blink  { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  @keyframes pulse  { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  @media (max-width: 820px) {
    .viewer-inner { flex-direction: column; align-items: center; gap: 20px; max-height: none; overflow-y: auto; }
    #ssImg { max-width: 90vw; max-height: 50vw; }
    .viewer-bio-col { max-height: none; width: 100%; }
  }
</style>
</head>

<nav>

<!-- ── Lightbox ── -->
<div id="ssViewer">
  <button id="ssClose">✕</button>
  <div class="viewer-inner">
    <!-- Image side -->
    <div class="viewer-img-col">
      <img id="ssImg" src="" alt="">
      <div class="lb-label" id="lbLabel"></div>
      <div class="viewer-controls">
        <button class="viewer-btn" id="ssPrev">&#8592;</button>
        <div class="viewer-counter"><span id="viewerCurrent">1</span> / <span id="viewerTotal">0</span></div>
        <button class="viewer-btn" id="ssNext">&#8594;</button>
      </div>
    </div>
    <!-- Description side -->
    <div class="viewer-bio-col">
      <div class="bio-wrap" id="bioWrap">
        <div class="bio-no-info">No description available</div>
      </div>
    </div>
  </div>
</div>

<!-- ── Main ── -->
<main>
  <div class="page-header">
    <div>
      <div class="eyebrow">Leonida ·</div>
      <div class="page-title">Places</div>
    </div>
    <div class="count-badge"><span id="count">0</span> locations</div>
  </div>

  <div class="status-bar">
    <div class="status-dot loading" id="status-dot"></div>
    <div class="status-text" id="status-text">Scanning repository…</div>
  </div>

  <div class="empty" id="empty">
    <div class="empty-icon">📂</div>
    <div class="empty-title">No Images Found</div>
    <div class="empty-sub">
      Drop <code>.jpg</code>, <code>.png</code>, <code>.webp</code> or <code>.gif</code> files
      into <code>leonida/places/</code> and they'll appear here automatically.
    </div>
  </div>

  <div class="places-grid" id="gallery"></div>
</main>

        "Flaming fields, gang activity, and blue-collar grit define this industrial county. Where the factory ends, the Final Chapter biker gang begins."
      ]
    },
    'mount kalaga': {
      fullName: 'Mount Kalaga National Park',
      region: 'Northern Leonida · State Border',
      tagline: 'Room to Breathe',
      quote: 'Room to breathe on the state\'s northern fringes.',
      desc: [
        "A national landmark up against the state's northern border, Mount Kalaga offers prime hunting, fishing, and off-road trails. In the lush surrounding backwoods, hillbilly mystics and paranoid radicals live far from the prying eyes of the government.",
        "Rugged forests, canyons, and winding riverways stretch across this remote corner of Leonida — the furthest you can get from the neon of Vice City."
      ]
    },
    'kalaga': {
      fullName: 'Mount Kalaga National Park',
      region: 'Northern Leonida · State Border',
      tagline: 'Room to Breathe',
      quote: "Room to breathe on the state's northern fringes.",
      desc: [
        "A national landmark up against the state's northern border, Mount Kalaga offers prime hunting, fishing, and off-road trails. In the lush surrounding backwoods, hillbilly mystics and paranoid radicals live far from the prying eyes of the government.",
        "Rugged forests, canyons, and winding riverways stretch across this remote corner of Leonida — the furthest you can get from the neon of Vice City."
      ]
    }
  };

  /* ============================================================
     PLACE LOOKUP — normalise filename stem then fuzzy match
  ============================================================ */
  function getInfo(filename) {
    const stem = filename
      .replace(/\.[^.]+$/, '')
      .toLowerCase()
      .replace(/[-_]/g, ' ')
      .trim();

    if (PLACE_INFO[stem]) return PLACE_INFO[stem];

    for (const key of Object.keys(PLACE_INFO)) {
      if (stem.includes(key) || key.includes(stem)) return PLACE_INFO[key];
    }
    return null;
  }

  /* ============================================================
     RENDER DESCRIPTION PANEL
  ============================================================ */
  function renderInfo(filename, label) {
    const data = getInfo(filename);
    if (!data) {
      bioWrap.innerHTML = `
        <div class="bio-eyebrow">Location File</div>
        <div class="bio-name">${label}</div>
        <div class="bio-no-info">No official description available yet.</div>
      `;
      return;
    }
    const paragraphs = data.desc.map(p => `<p>${p}</p>`).join('');
    bioWrap.innerHTML = `
      <div class="bio-eyebrow">Location · ${data.region}</div>
      <div class="bio-name">${data.fullName}</div>
      <div class="bio-tag">${data.tagline}</div>
      <div class="bio-divider"></div>
      ${data.quote ? `<div class="bio-quote">"${data.quote}"</div>` : ''}
      <div class="bio-text">${paragraphs}</div>
    `;
  }

  /* ============================================================
     ELEMENTS
  ============================================================ */
  const gallery       = document.getElementById('gallery');
  const ssViewer      = document.getElementById('ssViewer');
  const ssImg         = document.getElementById('ssImg');
  const countEl       = document.getElementById('count');
  const statusDot     = document.getElementById('status-dot');
  const statusText    = document.getElementById('status-text');
  const lbLabel       = document.getElementById('lbLabel');
  const viewerCurrent = document.getElementById('viewerCurrent');
  const viewerTotal   = document.getElementById('viewerTotal');
  const bioWrap       = document.getElementById('bioWrap');

  let ssIdx     = 0;
  let allImages = [];

  /* ============================================================
     STATUS HELPER
  ============================================================ */
  function setStatus(type, msg) {
    statusDot.className  = 'status-dot ' + type;
    statusText.className = 'status-text ' + (type === 'loading' ? '' : type);
    statusText.textContent = msg;
  }

  /* ============================================================
     LOAD — GitHub API
  ============================================================ */
  async function loadImages() {
    setStatus('loading', 'Fetching ' + GITHUB_USER + '/' + GITHUB_REPO + '/' + IMAGES_PATH + ' …');

    const apiURL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${IMAGES_PATH}?ref=${BRANCH}`;

    let files;
    try {
      const res = await fetch(apiURL, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
      if (res.status === 404) {
        setStatus('err', 'Folder not found: ' + IMAGES_PATH);
        document.getElementById('empty').style.display = 'flex';
        return;
      }
      if (!res.ok) throw new Error('GitHub API returned ' + res.status);
      files = await res.json();
    } catch (err) {
      setStatus('err', 'GitHub API error — ' + err.message);
      document.getElementById('empty').style.display = 'flex';
      return;
    }

    if (!Array.isArray(files)) {
      setStatus('err', 'Unexpected response from GitHub API');
      document.getElementById('empty').style.display = 'flex';
      return;
    }

    const images = files.filter(f =>
      f.type === 'file' &&
      IMAGE_EXTS.some(ext => f.name.toLowerCase().endsWith(ext))
    );

    if (!images.length) {
      setStatus('ok', IMAGES_PATH + '  ·  no images found yet');
      document.getElementById('empty').style.display = 'flex';
      return;
    }

    setStatus('ok', IMAGES_PATH + '  ·  ' + images.length + ' image' + (images.length !== 1 ? 's' : '') + ' detected');
    countEl.textContent     = images.length;
    viewerTotal.textContent = images.length;
    allImages = images;

    images.forEach((file, i) => {
      const src   = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${IMAGES_PATH}/${file.name}`;
      const label = file.name
        .replace(/\.[^.]+$/, '')
        .replace(/[-_]/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());

      const card = document.createElement('div');
      card.className = 'gallery-item';
      card.style.transitionDelay = (i * 0.04).toFixed(2) + 's';

      const imgWrap = document.createElement('div');
      imgWrap.className = 'card-img-wrap';

      const numBadge = document.createElement('span');
      numBadge.className = 'card-num';
      numBadge.textContent = '#' + String(i + 1).padStart(2, '0');

      const img = document.createElement('img');
      img.alt         = label;
      img.loading     = 'lazy';
      img.dataset.idx = String(i);
      img.src         = src;

      imgWrap.appendChild(numBadge);
      imgWrap.appendChild(img);

      const cardBody = document.createElement('div');
      cardBody.className = 'card-body';
      cardBody.innerHTML = `
        <div class="card-name">${label}</div>
        <div class="card-file">${file.name}</div>
      `;

      card.appendChild(imgWrap);
      card.appendChild(cardBody);
      gallery.appendChild(card);

      ssObs.observe(card);
    });
  }

  /* ============================================================
     INTERSECTION OBSERVER — scroll-reveal
  ============================================================ */
  const ssObs = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if (en.isIntersecting) {
        en.target.classList.add('visible');
        ssObs.unobserve(en.target);
      }
    });
  }, { threshold: 0.05 });

  /* ============================================================
     VIEWER HELPERS
  ============================================================ */
  function getVisibleImgs() {
    return [...gallery.querySelectorAll('img[data-idx]')];
  }

  function labelFromFile(file) {
    return file.name
      .replace(/\.[^.]+$/, '')
      .replace(/[-_]/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function openViewer(idx) {
    const imgs = getVisibleImgs();
    if (!imgs.length) return;
    ssIdx = idx;
    const file  = allImages[ssIdx];
    const label = labelFromFile(file);
    ssImg.src               = imgs[ssIdx].src;
    lbLabel.textContent     = label;
    viewerCurrent.textContent = ssIdx + 1;
    viewerTotal.textContent   = imgs.length;
    renderInfo(file.name, label);
    ssViewer.classList.add('active');
  }

  function ssClose() { ssViewer.classList.remove('active'); }

  function ssStep(dir) {
    const imgs = getVisibleImgs();
    if (!imgs.length) return;
    ssIdx = (ssIdx + dir + imgs.length) % imgs.length;
    ssImg.style.opacity   = '0';
    bioWrap.style.opacity = '0';
    setTimeout(() => {
      const file  = allImages[ssIdx];
      const label = labelFromFile(file);
      ssImg.src               = imgs[ssIdx].src;
      lbLabel.textContent     = label;
      viewerCurrent.textContent = ssIdx + 1;
      renderInfo(file.name, label);
      ssImg.style.opacity   = '1';
      bioWrap.style.opacity = '1';
    }, 130);
  }

  /* ============================================================
     EVENTS
  ============================================================ */
  gallery.addEventListener('click', e => {
    const img = e.target.closest('img[data-idx]');
    if (!img) return;
    openViewer(parseInt(img.dataset.idx, 10));
  });

  document.getElementById('ssClose').addEventListener('click', ssClose);
  ssViewer.addEventListener('click', e => { if (e.target === ssViewer) ssClose(); });
  document.getElementById('ssPrev').addEventListener('click', () => ssStep(-1));
  document.getElementById('ssNext').addEventListener('click', () => ssStep(1));

  document.addEventListener('keydown', e => {
    if (!ssViewer.classList.contains('active')) return;
    if (e.key === 'Escape')      ssClose();
    if (e.key === 'ArrowLeft')   ssStep(-1);
    if (e.key === 'ArrowRight')  ssStep(1);
  });

  /* ============================================================
     KICK OFF
  ============================================================ */
  loadImages();
</script>
</body>
