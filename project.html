<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Leonida</title>
<meta name="description" content="The neon-lit gateway to Leonida. Live countdown, both official trailers, the full interactive map, character bios, location breakdowns & more. The wait ends November 19, 2026.">
<link rel="canonical" href="https://voqcl.xyz">
<meta property="og:type" content="website">
<meta property="og:url" content="https://vocql.github.io/leonida/">
<meta property="og:title" content="Welcome to Leonida 🌊🌅✨">
<meta property="og:description" content="The neon-lit gateway to Leonida. Live countdown. November 19, 2026.">
<meta property="og:image" content="https://vocql.github.io/leonida/leonida/images/leonida.png">
<meta name="theme-color" content="#ff4dd2">
<meta name="robots" content="index, follow">
<meta name="author" content="VOCQL">
<link rel="icon" href="leonida/images/leonida.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --cyan: #00ffff;
  --pink: #ff00c8;
  --purple: #7700ff;
  --bg: #04001a;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  position: relative;
}

#auroraCanvas { display: none; }

.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 55% at 12% 20%, rgba(0,255,255,0.07) 0%, transparent 100%),
    radial-gradient(ellipse 65% 50% at 88% 78%, rgba(255,0,200,0.08) 0%, transparent 100%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(100,0,220,0.05) 0%, transparent 100%);
}

.bg-grid {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background-image:
    linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 85% 65% at center, black 10%, transparent 75%);
}

.particles { position: fixed; inset: 0; z-index: 2; overflow: hidden; pointer-events: none; }
.particle {
  position: absolute; border-radius: 50%;
  animation: floatUp linear infinite; opacity: 0;
}
@keyframes floatUp {
  0%   { transform: translateY(100vh); opacity: 0; }
  10%  { opacity: 0.8; }
  90%  { opacity: 0.4; }
  100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
}

/* HAMBURGER */
.hamburger-btn {
  position: fixed; top: 22px; right: 26px; z-index: 200;
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(0,255,255,0.05);
  border: 1.5px solid rgba(0,255,255,0.25);
  box-shadow: 0 0 20px rgba(0,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.1);
  backdrop-filter: blur(16px);
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  transition: all 0.3s ease;
  animation: fadeSlideIn 0.8s cubic-bezier(0.34,1.4,0.64,1) both;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateX(20px) scale(0.8); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
.hamburger-btn:hover {
  background: rgba(0,255,255,0.1); border-color: var(--cyan);
  box-shadow: 0 0 28px rgba(0,255,255,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
  transform: scale(1.08);
}
.hamburger-btn.open {
  background: rgba(255,0,200,0.08); border-color: rgba(255,0,200,0.3);
  box-shadow: 0 0 28px rgba(255,0,200,0.2);
}
.bar {
  width: 20px; height: 2px; border-radius: 2px; background: var(--cyan);
  transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1), opacity 0.2s;
  transform-origin: center;
}
.hamburger-btn.open .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); background: var(--pink); }
.hamburger-btn.open .bar:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger-btn.open .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background: var(--pink); }

/* NAV OVERLAY */
.nav-overlay {
  position: fixed; inset: 0; z-index: 150;
  pointer-events: none; opacity: 0; transition: opacity 0.4s ease;
}
.nav-overlay.open { pointer-events: all; opacity: 1; }
.nav-backdrop {
  position: absolute; inset: 0;
  background: rgba(4,0,26,0.9); backdrop-filter: blur(24px);
}
.nav-panel {
  position: absolute; top: 0; right: 0;
  width: min(380px,100vw); height: 100%;
  background: linear-gradient(160deg, rgba(0,255,255,0.04), rgba(255,0,200,0.04));
  border-left: 1px solid rgba(0,255,255,0.12);
  box-shadow: -30px 0 80px rgba(0,0,0,0.5);
  transform: translateX(100%);
  transition: transform 0.5s cubic-bezier(0.34,1.2,0.64,1);
  display: flex; flex-direction: column; justify-content: center;
  padding: 80px 48px; overflow: hidden;
}
.nav-panel::before {
  content: ''; position: absolute; top: -80px; right: -80px;
  width: 360px; height: 360px;
  background: radial-gradient(circle, rgba(0,255,255,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.nav-panel::after {
  content: ''; position: absolute; bottom: -60px; left: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(255,0,200,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.nav-overlay.open .nav-panel { transform: translateX(0); }
.nav-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.4em;
  text-transform: uppercase; color: rgba(0,255,255,0.35); margin-bottom: 36px;
}
.nav-links { list-style: none; display: flex; flex-direction: column; gap: 2px; }
.nav-links li {
  opacity: 0; transform: translateX(28px);
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
}
.nav-overlay.open .nav-links li:nth-child(1){opacity:1;transform:none;transition-delay:.07s}
.nav-overlay.open .nav-links li:nth-child(2){opacity:1;transform:none;transition-delay:.12s}
.nav-overlay.open .nav-links li:nth-child(3){opacity:1;transform:none;transition-delay:.17s}
.nav-overlay.open .nav-links li:nth-child(4){opacity:1;transform:none;transition-delay:.22s}
.nav-overlay.open .nav-links li:nth-child(5){opacity:1;transform:none;transition-delay:.27s}
.nav-overlay.open .nav-links li:nth-child(6){opacity:1;transform:none;transition-delay:.32s}
.nav-links li a {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(36px,6vw,52px); font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.04em;
  text-decoration: none; color: rgba(255,255,255,0.18);
  display: block; padding: 9px 0; line-height: 1;
  transition: color 0.2s, letter-spacing 0.25s; position: relative;
}
.nav-links li a:hover { color: #fff; letter-spacing: 0.08em; text-shadow: none; }
.nav-links li a.active { color: #fff; }
.nav-footer {
  position: absolute; bottom: 36px; left: 48px; right: 48px;
  padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: space-between;
  opacity: 0; transition: opacity 0.4s ease 0.38s;
}
.nav-overlay.open .nav-footer { opacity: 1; }
.nav-footer-text { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.18); }
.nav-footer-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--pink); box-shadow: 0 0 8px var(--pink);
  animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(0.55)} }

/* TITLE */
.title-wrap {
  position: relative; z-index: 5; text-align: center;
  animation: popIn 1s cubic-bezier(0.34,1.56,0.64,1) both;
}
.welcome-small {
  font-size: 12px; font-weight: 600; letter-spacing: 0.45em;
  text-transform: uppercase; color: rgba(255,255,255,0.32); margin-bottom: 6px;
}
.leonida-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(72px,13vw,140px); font-weight: 900;
  text-transform: uppercase; line-height: 0.88;
  background: linear-gradient(90deg, #00ffff, #bf00ff, #ff00c8, #00e5ff, #00ffff);
  background-size: 300% auto;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: textShimmer 4s linear infinite;
  filter: drop-shadow(0 0 40px rgba(0,255,255,0.28)) drop-shadow(0 0 70px rgba(255,0,200,0.15));
}
@keyframes textShimmer { 0%{background-position:0%} 100%{background-position:300%} }

/* COUNTDOWN */
.pills {
  position: relative; z-index: 5;
  display: flex; align-items: center; gap: 10px;
  animation: popIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
}
.pill {
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 26px 12px; border-radius: 14px;
  background: rgba(0,255,255,0.04);
  border: 1px solid rgba(0,255,255,0.18);
  box-shadow: 0 0 24px rgba(0,255,255,0.06), inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
  position: relative; overflow: hidden; min-width: 84px;
  transition: transform 0.25s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.25s;
}
.pill:hover {
  transform: translateY(-5px) scale(1.04);
  box-shadow: 0 0 40px rgba(0,255,255,0.14), inset 0 1px 0 rgba(255,255,255,0.14), 0 16px 48px rgba(0,0,0,0.6);
}
.pill.pk {
  background: rgba(255,0,200,0.04); border-color: rgba(255,0,200,0.18);
  box-shadow: 0 0 24px rgba(255,0,200,0.06), inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.5);
}
.pill.pk:hover { box-shadow: 0 0 40px rgba(255,0,200,0.14), inset 0 1px 0 rgba(255,255,255,0.14), 0 16px 48px rgba(0,0,0,0.6); }
.pill::before {
  content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
}
.pill::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent); opacity: 0.35;
}
.pill.pk::after { background: linear-gradient(90deg, transparent, var(--pink), transparent); }
.pill-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 44px; font-weight: 900; line-height: 1;
  background: linear-gradient(160deg, #00ffff, #7700ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  min-width: 54px; text-align: center; display: block; letter-spacing: -0.02em;
  filter: drop-shadow(0 0 10px rgba(0,255,255,0.35));
}
.pk .pill-num {
  background: linear-gradient(160deg, #ff00c8, #7700ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 10px rgba(255,0,200,0.35));
}
.pill-lbl {
  font-size: 9px; font-weight: 600; letter-spacing: 0.28em;
  text-transform: uppercase; color: rgba(255,255,255,0.22); margin-top: 4px;
}
.sep {
  font-family: 'Barlow Condensed', sans-serif; font-size: 34px; font-weight: 900;
  background: linear-gradient(180deg, #00ffff, #ff00c8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  opacity: 0.45; margin-bottom: 14px;
  animation: sepBlink 1s ease-in-out infinite; user-select: none;
}
@keyframes sepBlink { 0%,100%{opacity:.45} 50%{opacity:.1} }
.bounce { animation: numBounce 0.45s cubic-bezier(0.34,1.8,0.64,1); }
@keyframes numBounce {
  0%  { transform: scale(1.5) translateY(-6px); }
  60% { transform: scale(0.9) translateY(2px); }
  100%{ transform: scale(1) translateY(0); }
}

/* SUBTITLE */
.subtitle-wrap {
  position: relative; z-index: 5;
  animation: popIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
.subtitle {
  font-size: 11px; font-weight: 600; letter-spacing: 0.3em;
  text-transform: uppercase; color: rgba(255,255,255,0.18);
  display: flex; align-items: center; gap: 14px;
}
.subtitle-divider { width: 28px; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent); }
.subtitle span.date { color: var(--pink); text-shadow: 0 0 14px rgba(255,0,200,0.3); }

/* PLATFORMS */
.platforms {
  position: relative; z-index: 5;
  display: flex; align-items: center; gap: 8px;
  animation: popIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.4s both;
}

.platform-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 5px 14px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.09); 
  color: rgba(255,255,255,0.28);
  background: rgba(255,255,255,0.02);
  transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}

/* Animated gradient border on hover */
.platform-badge:hover {
  color: #ffffff;
  box-shadow: 0 0 16px rgba(255,255,255,0.15);
  border: 1px solid transparent;   /* important */
  background: rgba(255,255,255,0.03);
}

.platform-badge:hover::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 8px;
  background: linear-gradient(90deg, 
    #00ffff, #bf00ff, #ff00c8, 
    #00e5ff, #00ffff);
  background-size: 300% 300%;
  animation: borderSpin 3s linear infinite;
  z-index: -1;
  filter: blur(1px);
}

@keyframes borderSpin {
  0%   { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

/* STATUS BAR */
.status-bar {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 10;
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.25em;
  text-transform: uppercase; color: rgba(255,255,255,0.13);
  animation: popIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.6s both;
  white-space: nowrap;
}
.status-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 8px var(--cyan);
  animation: dotPulse 2s ease-in-out infinite;
}

/* CLICK RIPPLE */
.ripple {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 4;
  border: 1.5px solid rgba(0,255,255,0.4);
  transform: translate(-50%,-50%) scale(0);
  animation: rippleOut 0.9s cubic-bezier(0.2,0.8,0.4,1) forwards;
}
@keyframes rippleOut {
  0%  { transform: translate(-50%,-50%) scale(0); opacity: 0.7; }
  100%{ transform: translate(-50%,-50%) scale(3.5); opacity: 0; }
}

/* TOOLTIP on pill hover */
.pill-tooltip {
  position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%);
  font-size: 9px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
  color: rgba(255,255,255,0.6); white-space: nowrap;
  background: rgba(4,0,26,0.85); border: 1px solid rgba(0,255,255,0.2);
  padding: 4px 10px; border-radius: 6px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  transform: translateX(-50%) translateY(4px);
}
.pill:hover .pill-tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes popIn {
  from { opacity: 0; transform: scale(0.75) translateY(14px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

@media (max-width: 500px) {
  .pills { gap: 6px; }
  .pill  { min-width: 66px; padding: 12px 14px 10px; }
  .pill-num { font-size: 32px; }
  .sep  { font-size: 24px; }
  .nav-panel { padding: 70px 28px; }
}
</style>
</head>
<body>

<canvas id="auroraCanvas"></canvas>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div id="mouseGlow"></div>
<div class="particles" id="particles"></div>

<!-- Hamburger -->
<button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</button>

<!-- Nav overlay -->
<div class="nav-overlay" id="navOverlay">
  <div class="nav-backdrop" id="navBackdrop"></div>
  <div class="nav-panel">
    <div class="nav-label">Navigation</div>
    <ul class="nav-links">
      <li><a href="#" class="active">Home</a></li>
      <li><a href="map">Map</a></li>
      <li><a href="places">Places</a></li>
      <li><a href="characters">Characters</a></li>
      <li><a href="screenshots">Screenshots</a></li>
      <li><a href="trailers">Trailers</a></li>
    </ul>
    <div class="nav-footer">
      <span class="nav-footer-text">November 19, 2026</span>
      <div class="nav-footer-dot"></div>
    </div>
  </div>
</div>

<!-- Main -->
<div class="title-wrap">
  <div class="welcome-small">Welcome to</div>
  <div class="leonida-text">Leonida</div>
</div>

<div class="pills">
  <div class="pill" id="pill-d">
    <div class="pill-tooltip" id="tip-d">200 days to go!</div>
    <span class="pill-num" id="n-d">000</span>
    <span class="pill-lbl">Days</span>
  </div>
  <div class="sep">:</div>
  <div class="pill pk" id="pill-h">
    <span class="pill-num" id="n-h">00</span>
    <span class="pill-lbl">Hours</span>
  </div>
  <div class="sep">:</div>
  <div class="pill" id="pill-m">
    <span class="pill-num" id="n-m">00</span>
    <span class="pill-lbl">Mins</span>
  </div>
  <div class="sep">:</div>
  <div class="pill pk" id="pill-s">
    <span class="pill-num" id="n-s">00</span>
    <span class="pill-lbl">Secs</span>
  </div>
</div>

<div class="subtitle-wrap">
  <div class="subtitle">
    <div class="subtitle-divider"></div>
    Release <span class="date">November 19, 2026</span>
    <div class="subtitle-divider"></div>
  </div>
</div>

<div class="platforms">
  <div class="platform-badge">PS5</div>
  <div class="platform-badge">Xbox Series X|S</div>
</div>

<script>
/* MOUSE GLOW */
const glow = document.getElementById('mouseGlow');
let mx = innerWidth/2, my = innerHeight/2, gx = mx, gy = my;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function loop(){
  gx += (mx-gx)*0.07; gy += (my-gy)*0.07;
  glow.style.left = gx+'px'; glow.style.top = gy+'px';
  requestAnimationFrame(loop);
})();

/* RIPPLES */
document.addEventListener('click', e => {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX+'px'; r.style.top = e.clientY+'px';
  r.style.width = r.style.height = '70px';
  r.style.borderColor = Math.random()>.5 ? 'rgba(255,0,200,0.5)' : 'rgba(0,255,255,0.5)';
  document.body.appendChild(r);
  setTimeout(()=>r.remove(), 950);
});

/* HAMBURGER */
const hBtn = document.getElementById('hamburgerBtn');
const overlay = document.getElementById('navOverlay');
const backdrop = document.getElementById('navBackdrop');
function toggleMenu(){
  const open = overlay.classList.toggle('open');
  hBtn.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
}
hBtn.addEventListener('click', toggleMenu);
backdrop.addEventListener('click', toggleMenu);
document.addEventListener('keydown', e => { if(e.key==='Escape' && overlay.classList.contains('open')) toggleMenu(); });

/* COUNTDOWN */
const prev = {d:'',h:'',m:'',s:''};
function bounce(id){
  const el = document.getElementById('n-'+id);
  el.classList.remove('bounce'); void el.offsetWidth; el.classList.add('bounce');
  setTimeout(()=>el.classList.remove('bounce'), 500);
}
function tick(){
  const target = new Date('2026-11-19T00:00:00');
  const diff = target - new Date();
  if(diff<=0){ ['d','h','m','s'].forEach(k=>document.getElementById('n-'+k).textContent='00'); return; }
  const d = String(Math.floor(diff/86400000)).padStart(3,'0');
  const h = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
  const m = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
  const s = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  if(d!==prev.d){document.getElementById('n-d').textContent=d;bounce('d');prev.d=d;
    const tip=document.getElementById('tip-d');
    if(tip) tip.textContent=d+' days to go!';}
  if(h!==prev.h){document.getElementById('n-h').textContent=h;bounce('h');prev.h=h;}
  if(m!==prev.m){document.getElementById('n-m').textContent=m;bounce('m');prev.m=m;}
  if(s!==prev.s){document.getElementById('n-s').textContent=s;bounce('s');prev.s=s;}
}
tick(); setInterval(tick,1000);
</script>
</body>
</html>
